<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Ticket Tracker - {{ project }}</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery & Select2 -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <!-- Grid.js -->
    <link href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>

    <style>
        /* Select2 Dark Theme Overrides */
        .select2-container--default .select2-selection--single {
            background-color: #374151 !important;
            border: 1px solid #4b5563 !important;
            height: 42px !important;
            border-radius: 8px !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: #f3f4f6 !important;
            line-height: 40px !important;
        }

        .select2-dropdown {
            background-color: #1f2937 !important;
            border: 1px solid #4b5563 !important;
            color: white !important;
        }

        .select2-search__field {
            background-color: #374151 !important;
            color: white !important;
            border: 1px solid #4b5563 !important;
        }

        .select2-results__option--highlighted[aria-selected] {
            background-color: #2563eb !important;
            color: white !important;
        }

        .select2-results__option--selected {
            background-color: #4b5563 !important;
            color: white !important;
        }

        .select2-results__option[aria-selected=true] {
            background-color: #4b5563 !important;
            color: white !important;
        }

        /* Dark Theme Override for Grid.js */
        .gridjs-container {
            background-color: transparent !important;
            color: #d1d5db !important;
            border: none !important;
        }

        .gridjs-summary {
            color: #ffffff;
        }

        .gridjs-wrapper {
            background-color: #1f2937;
            border-radius: 12px;
            border: 1px solid #374151;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .gridjs-head {
            background-color: #111827;
        }

        .gridjs-th {
            background-color: #111827 !important;
            color: #9ca3af !important;
            border-bottom: 1px solid #374151 !important;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 12px 16px !important;
        }

        .gridjs-tr {
            background-color: #1f2937;
        }

        .gridjs-tr:hover td {
            background-color: #374151 !important;
        }

        .gridjs-td {
            background-color: transparent !important;
            border-bottom: 1px solid #374151 !important;
            color: #e5e7eb;
            font-size: 0.875rem;
            padding: 10px 16px !important;
            text-wrap: auto;
        }

        .gridjs-footer {
            background-color: #111827 !important;
            border-top: 1px solid #374151 !important;
            border-radius: 0 0 12px 12px;
        }

        input.gridjs-input {
            background-color: #111827;
            border: 1px solid #4b5563;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
        }

        .glass {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 7px !important;
        }

        ::-webkit-scrollbar-track {
            background: rgb(68, 68, 68) !important;
        }

        ::-webkit-scrollbar-thumb {
            background: #50c2a6 !important;
            border-radius: 5px !important;
            opacity: 0.5 !important;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #378370 !important;
            opacity: 1 !important;
        }

        #tableWrapper span {
            text-wrap: auto;
        }

        [data-theme="light"] body {
            background-color: #f8fafc !important;
            color: #0f172a !important;
        }

        [data-theme="light"] .glass {
            background: rgba(255, 255, 255, 0.95) !important;
            border: 1px solid #e2e8f0 !important;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06) !important;
            backdrop-filter: blur(10px);
        }

        [data-theme="light"] h1.text-white,
        [data-theme="light"] .text-white {
            color: #0f172a !important;
        }

        [data-theme="light"] .text-gray-400 {
            color: #64748b !important;
        }

        [data-theme="light"] .text-gray-500 {
            color: #475569 !important;
        }

        [data-theme="light"] #trackerJql {
            background-color: #f1f5f9 !important;
            color: #334155 !important;
            border: 1px solid #e2e8f0 !important;
        }

        [data-theme="light"] .select2-container--default .select2-selection--single {
            background-color: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
        }

        [data-theme="light"] .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: #0f172a !important;
        }

        [data-theme="light"] .select2-dropdown {
            background-color: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
            color: #0f172a !important;
        }

        [data-theme="light"] .select2-search__field {
            background-color: #f8fafc !important;
            color: #0f172a !important;
            border: 1px solid #cbd5e1 !important;
        }

        [data-theme="light"] .select2-results__option--selected,
        [data-theme="light"] .select2-results__option[aria-selected=true] {
            background-color: #e2e8f0 !important;
            color: #0f172a !important;
        }

        [data-theme="light"] .gridjs-wrapper {
            background-color: #ffffff !important;
            border: 1px solid #e2e8f0 !important;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06) !important;
        }

        [data-theme="light"] .gridjs-head {
            background-color: #f8fafc !important;
        }

        [data-theme="light"] .gridjs-th {
            background-color: #f8fafc !important;
            color: #64748b !important;
            border-bottom: 1px solid #e2e8f0 !important;
        }

        [data-theme="light"] .gridjs-tr {
            background-color: #ffffff !important;
        }

        [data-theme="light"] .gridjs-tr:hover td {
            background-color: #f8fafc !important;
        }

        [data-theme="light"] .gridjs-td {
            color: #1e293b !important;
            border-bottom: 1px solid #e2e8f0 !important;
        }

        [data-theme="light"] .gridjs-footer {
            background-color: #ffffff !important;
            border-top: 1px solid #e2e8f0 !important;
        }

        [data-theme="light"] .gridjs-summary {
            color: #475569 !important;
        }

        [data-theme="light"] input.gridjs-input {
            background-color: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
            color: #0f172a !important;
        }

        [data-theme="light"] .bg-gray-700 {
            background-color: #e2e8f0 !important;
            color: #334155 !important;
        }

        [data-theme="light"] .bg-green-900 {
            background-color: #dcfce7 !important;
        }

        [data-theme="light"] .text-green-300 {
            color: #166534 !important;
        }

        [data-theme="light"] .border-green-700 {
            border-color: #86efac !important;
        }

        [data-theme="light"] .bg-blue-900 {
            background-color: #dbeafe !important;
        }

        [data-theme="light"] .text-blue-300 {
            color: #1d4ed8 !important;
        }

        [data-theme="light"] .border-blue-700 {
            border-color: #93c5fd !important;
        }

        [data-theme="light"] ::-webkit-scrollbar-track {
            background: #e2e8f0 !important;
        }

        [data-theme="light"] ::-webkit-scrollbar-thumb {
            background: #94a3b8 !important;
        }

        [data-theme="light"] ::-webkit-scrollbar-thumb:hover {
            background: #64748b !important;
        }
    </style>
    <link rel="stylesheet" href="/static/theme.css">
    <script src="/static/theme.js"></script>
    <script src="/static/app.js"></script>
</head>

<body class="bg-gray-900 min-h-screen text-white font-sans">

    <!-- Navigation -->
    {% include 'navbar.html' %}

    <main class="pt-24 pb-12 px-6 max-w-[95%] mx-auto">
        <!-- Tracker Group List (Initially Visible) -->
        <div id="trackerListView">
            <div class="mb-8 flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold text-white mb-2">My Ticket Trackers</h1>
                    <p class="text-gray-400">Manage and view your saved ticket groups.</p>
                </div>
                <button onclick="createNewTracker()"
                    class="bg-blue-600 hover:bg-blue-500 text-white font-bold h-[42px] px-6 rounded-lg shadow-lg transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    New Tracker
                </button>
            </div>

            <div id="trackersGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Trackers populated here -->
                <div class="col-span-full text-center py-20 text-gray-500">Loading your trackers...</div>
            </div>
        </div>

        <!-- Active Tracker Detail (Hidden by default) -->
        <div id="trackerDetailView" class="hidden">
            <div class="mb-8 flex justify-between items-end">
                <div>
                    <button onclick="showTrackerList()"
                        class="text-gray-400 hover:text-white transition flex items-center gap-2 mb-4">
                        &larr; Back to Trackers
                    </button>
                    <h1 id="activeTrackerTitle" class="text-3xl font-bold text-white mb-2">Tracker Name</h1>
                    <p id="activeTrackerSubtitle" class="text-gray-400">Status and details for this group of tickets.
                    </p>
                    <button onclick="toggleJql()"
                        class="text-xs text-gray-500 hover:text-gray-300 flex items-center gap-1 mt-2 transition">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        Show current JQL
                    </button>
                    <code id="trackerJql"
                        class="hidden text-xs text-gray-500 font-mono mt-2 block bg-gray-800 p-2 rounded max-w-2xl whitespace-pre-wrap"></code>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="copyToClipboard(this)"
                        class="bg-green-600 hover:bg-green-500 text-white font-bold h-[42px] px-6 rounded-lg shadow-lg transition flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3">
                            </path>
                        </svg>
                        Copy as Text
                    </button>
                    <button onclick="copyExcelToClipboard(this)"
                        class="bg-blue-600 hover:bg-blue-500 text-white font-bold h-[42px] px-6 rounded-lg shadow-lg transition flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m-6-8h6M7 20h10a2 2 0 002-2V6a2 2 0 00-2-2H7a2 2 0 00-2 2v12a2 2 0 002 2z">
                            </path>
                        </svg>
                        Copy for Excel
                    </button>
                </div>
            </div>

            <!-- Controls -->
            <div class="glass p-6 rounded-2xl mb-8 flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-1 w-full">
                    <label class="block text-sm font-bold text-gray-400 mb-2">Search Ticket Number or Summary</label>
                    <select id="ticketSearch" class="w-full" style="width: 100%;"></select>
                </div>
                <button onclick="addTicketToTracker()"
                    class="bg-blue-600 hover:bg-blue-500 text-white font-bold h-[42px] px-8 text-sm rounded-lg shadow-lg transition w-full md:w-auto">
                    Add to Tracker
                </button>
            </div>

            <!-- Table Container -->
            <div id="tableWrapper" class="fade-in"></div>
        </div>
    </main>

    <script>
        let trackers = [];
        let activeTrackerId = null;
        let gridInstance = null;
        let ticketComments = {}; // Map of key -> comment
        let lastFetchedData = []; // Store last fetched Jira data for export

        $(document).ready(function () {
            // One-time cleanup of legacy localStorage data
            localStorage.removeItem('tracked_keys');

            loadTrackers();
            initSearch();
        });

        async function loadTrackers() {
            try {
                const headers = window.getApiHeaders ? window.getApiHeaders() : {
                    "X-Project-Key": (localStorage.getItem("project_key") || "").trim().toUpperCase()
                };
                const res = await fetch("/api/trackers", { headers: headers });
                if (!res.ok) throw new Error("Failed to load trackers");
                trackers = await res.json();
                renderTrackersGrid();
            } catch (e) {
                console.error("Load Trackers Error:", e);
                document.getElementById("trackersGrid").innerHTML = `<div class="col-span-full text-center py-20 text-red-500">Error loading trackers: ${e.message}</div>`;
            }
        }

        function renderTrackersGrid() {
            const grid = document.getElementById("trackersGrid");
            if (trackers.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500">No trackers found. Create one to get started.</div>';
                return;
            }

            grid.innerHTML = trackers.map(t => `
                <div class="glass p-6 rounded-2xl hover:border-blue-500 transition cursor-pointer group flex flex-col justify-between" onclick="openTracker(${t.id}, '${t.title}')">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div class="bg-blue-900/50 p-3 rounded-xl text-blue-400">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path>
                                </svg>
                            </div>
                            <button onclick="event.stopPropagation(); deleteTracker(${t.id})" class="text-gray-600 hover:text-red-500 p-1">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-1 group-hover:text-blue-400 transition">${t.title}</h3>
                        <p class="text-xs text-gray-500">Created: ${new Date(t.created_at).toLocaleDateString()}</p>
                    </div>
                    <div class="mt-6 flex items-center text-sm text-blue-400 font-bold group-hover:translate-x-1 transition">
                        View Tracker &rarr;
                    </div>
                </div>
            `).join('');
        }

        async function createNewTracker() {
            const title = prompt("Enter a title for your tracker:");
            if (!title) return;

            try {
                const headers = window.getApiHeaders ? window.getApiHeaders() : {
                    "Content-Type": "application/json",
                    "X-Project-Key": (localStorage.getItem("project_key") || "").trim().toUpperCase()
                };
                const res = await fetch("/api/trackers", {
                    method: "POST",
                    headers: headers,
                    body: JSON.stringify({ title })
                });

                if (res.ok) {
                    loadTrackers();
                } else {
                    const errorData = await res.json();
                    throw new Error(errorData.error || "Failed to create tracker");
                }
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        async function deleteTracker(id) {
            if (!confirm("Are you sure you want to delete this tracker and all its tickets?")) return;

            try {
                const headers = window.getApiHeaders ? window.getApiHeaders() : {
                    "X-Project-Key": (localStorage.getItem("project_key") || "").trim().toUpperCase()
                };
                const res = await fetch(`/api/trackers/${id}`, {
                    method: "DELETE",
                    headers: headers
                });
                if (res.ok) {
                    loadTrackers();
                } else {
                    throw new Error("Failed to delete tracker");
                }
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        function showTrackerList() {
            document.getElementById("trackerListView").classList.remove("hidden");
            document.getElementById("trackerDetailView").classList.add("hidden");

            // Clean up when leaving detail view
            if (gridInstance) {
                gridInstance.destroy();
                gridInstance = null;
            }
            document.getElementById("tableWrapper").innerHTML = "";
            activeTrackerId = null;
            loadTrackers();
        }

        async function openTracker(id, title) {
            activeTrackerId = id;
            document.getElementById("activeTrackerTitle").innerText = title;
            document.getElementById("trackerListView").classList.add("hidden");
            document.getElementById("trackerDetailView").classList.remove("hidden");
            fetchData();
        }

        function initSearch() {
            $('#ticketSearch').select2({
                placeholder: 'e.g. TIM-123',
                minimumInputLength: 2,
                ajax: {
                    url: '/api/suggest_tickets',
                    type: 'POST',
                    contentType: 'application/json',
                    delay: 250,
                    transport: function (params, success, failure) {
                        var $request = $.ajax(params);
                        $request.then(success);
                        $request.fail(failure);
                        return $request;
                    },
                    beforeSend: function (xhr) {
                        const headers = window.getApiHeaders ? window.getApiHeaders() : {};
                        for (const [key, value] of Object.entries(headers)) {
                            xhr.setRequestHeader(key, value);
                        }
                        // Fallback if getApiHeaders is missing or doesn't include project key (unlikely)
                        if (!headers["X-Project-Key"]) {
                            const projectKey = (localStorage.getItem("project_key") || "").trim().toUpperCase();
                            if (projectKey) xhr.setRequestHeader("X-Project-Key", projectKey);
                        }
                    },
                    data: function (params) {
                        return JSON.stringify({ query: params.term });
                    },
                    processResults: function (data) {
                        return { results: data.results };
                    },
                    error: function (jqXHR, textStatus, errorThrown) {
                        console.error("Select2 Search Error:", textStatus, errorThrown);
                    }
                }
            });
        }

        async function addTicketToTracker() {
            const val = $('#ticketSearch').val();
            if (!val || !activeTrackerId) return;

            try {
                const headers = window.getApiHeaders ? window.getApiHeaders() : { "Content-Type": "application/json" };
                const res = await fetch(`/api/trackers/${activeTrackerId}/tickets`, {
                    method: "POST",
                    headers: headers,
                    body: JSON.stringify({ issueKey: val })
                });

                if (res.ok) {
                    $('#ticketSearch').val(null).trigger('change');
                    fetchData();
                } else {
                    const data = await res.json();
                    throw new Error(data.error || "Failed to add ticket");
                }
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        async function removeTicketFromTracker(key) {
            try {
                const headers = window.getApiHeaders ? window.getApiHeaders() : {};
                const res = await fetch(`/api/trackers/${activeTrackerId}/tickets/${key}`, {
                    method: "DELETE",
                    headers: headers
                });
                if (res.ok) {
                    fetchData();
                } else {
                    throw new Error("Failed to remove ticket");
                }
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        async function updateComment(key, currentComment) {
            const newComment = prompt("Update Notes/Comment for " + key, currentComment || "");
            if (newComment === null) return;

            try {
                const headers = window.getApiHeaders ? window.getApiHeaders() : {
                    "Content-Type": "application/json",
                    "X-Project-Key": (localStorage.getItem("project_key") || "").trim().toUpperCase()
                };
                const res = await fetch(`/api/trackers/${activeTrackerId}/tickets/comment`, {
                    method: "PUT",
                    headers: headers,
                    body: JSON.stringify({ issueKey: key, comment: newComment })
                });

                if (res.ok) {
                    fetchData();
                } else {
                    throw new Error("Failed to update comment");
                }
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        function toggleJql() {
            const el = document.getElementById("trackerJql");
            if (el) el.classList.toggle("hidden");
        }

        async function fetchData() {
            if (!activeTrackerId) return;
            const tableEl = document.getElementById("tableWrapper");
            tableEl.innerHTML = '<div class="text-center p-20 text-gray-500 animate-pulse">Fetching tracker details...</div>';

            try {
                // 1. Get database tickets (to get identifiers and comments)
                const dbRes = await fetch(`/api/trackers/${activeTrackerId}/tickets`);
                if (!dbRes.ok) throw new Error("Could not load database tickets");
                const dbTickets = await dbRes.json();

                if (dbTickets.length === 0) {
                    tableEl.innerHTML = '<div class="text-center py-20 text-gray-500">No tickets in this tracker. Add some above.</div>';
                    return;
                }

                const keys = dbTickets.map(t => t.issue_key);
                ticketComments = {};
                dbTickets.forEach(t => ticketComments[t.issue_key] = t.comment);

                // 2. Fetch live data from Jira
                const jql = `key IN (${keys.map(k => `"${k}"`).join(',')})`;
                document.getElementById("trackerJql").innerText = jql;

                const jiraRes = await fetch("/api/execute_jql", {
                    method: "POST",
                    headers: window.getApiHeaders ? window.getApiHeaders() : {
                        "Content-Type": "application/json",
                        "X-Project-Key": (localStorage.getItem("project_key") || "").trim().toUpperCase()
                    },
                    body: JSON.stringify({ jql })
                });

                if (!jiraRes.ok) throw new Error("Jira API returned an error");
                const jiraData = await jiraRes.json();
                renderTable(jiraData);
            } catch (e) {
                console.error("Fetch Error:", e);
                tableEl.innerHTML = `<div class="bg-red-900/30 border border-red-800 p-8 rounded-xl text-center">
                    <div class="text-red-400 font-bold mb-2">Failed to load data</div>
                    <div class="text-red-500 text-sm">${e.message}</div>
                    <button onclick="fetchData()" class="mt-4 text-xs underline text-gray-400 hover:text-white">Try Again</button>
                </div>`;
            }
        }

        function renderTable(rawData) {
            lastFetchedData = rawData;
            const tableEl = document.getElementById("tableWrapper");
            tableEl.innerHTML = "";

            try {
                const rows = rawData.map(i => {
                    const f = i.fields || {};
                    const comment = ticketComments[i.key] || "";
                    return [
                        f.issuetype?.name || "?",
                        i.key || "?",
                        f.summary || "No Summary",
                        comment,
                        f.assignee?.displayName || "Unassigned",
                        f.priority?.name || "None",
                        f.status?.name || "Unknown",
                        i.key, // For update action
                        i.key // For remove action
                    ];
                });

                if (gridInstance) {
                    gridInstance.destroy(); // Properly clean up the old instance
                    gridInstance = null;
                }
                tableEl.innerHTML = ""; // Clear for re-render

                gridInstance = new gridjs.Grid({
                    columns: [
                        { name: "Type", width: "80px" },
                        {
                            name: "Key",
                            width: "120px",
                            formatter: (cell) => gridjs.html(`<a href="https://lumberfi.atlassian.net/browse/${cell}" target="_blank" class="text-blue-400 hover:underline font-mono">${cell}</a>`)
                        },
                        { name: "Summary", width: "300px" },
                        {
                            name: "Notes/Link",
                            width: "250px",
                            formatter: (cell, row) => {
                                const key = row.cells[1].data;
                                const shortText = cell.length > 30 ? cell.substring(0, 30) + "..." : cell;
                                return gridjs.html(`<div class="flex items-center justify-between gap-2">
                                    <span class="text-xs italic text-gray-400">${shortText || "No notes"}</span>
                                    <button onclick="updateComment('${key}', '${cell.replace(/'/g, "\\'")}')" class="text-blue-400 hover:text-blue-300 text-[10px] uppercase">Edit</button>
                                </div>`);
                            }
                        },
                        { name: "Assignee", width: "150px" },
                        {
                            name: "Priority",
                            width: "100px",
                            formatter: (cell) => {
                                let color = "text-gray-400";
                                if (cell === "High" || cell === "Highest") color = "text-red-400 font-bold";
                                return gridjs.html(`<span class="${color}">${cell}</span>`)
                            }
                        },
                        {
                            name: "Status",
                            width: "130px",
                            formatter: (cell) => {
                                let color = "bg-gray-700 text-gray-300";
                                const greenStatuses = ["DEPLOYED", "DONE", "NOT A BUG", "READY FOR STAGING", "RESOLVED", "STAGED", "UNABLE TO REPRODUCE", "READY FOR QA", "READY FOR INTERNAL DEMO"];
                                if (cell && greenStatuses.includes(cell.toUpperCase())) color = "bg-green-900 text-green-300 border border-green-700";
                                if (cell === "In Progress") color = "bg-blue-900 text-blue-300 border border-blue-700";
                                return gridjs.html(`<span class="${color} px-2 py-1 rounded text-xs font-bold whitespace-nowrap">${cell}</span>`)
                            }
                        },
                        {
                            name: "Action",
                            width: "100px",
                            formatter: (cell) => gridjs.html(`<button onclick="removeTicketFromTracker('${cell}')" class="text-red-500 hover:text-red-400 font-bold transition">Remove</button>`)
                        }
                    ],
                    data: rows,
                    search: true,
                    sort: true,
                    pagination: { limit: 20 },
                    style: {
                        table: { 'white-space': 'nowrap' }
                    }
                }).render(tableEl);
            } catch (err) {
                console.error("Render Error:", err);
                tableEl.innerHTML = `<div class="text-red-500 p-4 font-mono text-xs">Internal UI Error: ${err.message}.</div>`;
            }
        }

        function copyToClipboard(btn) {
            if (!lastFetchedData || lastFetchedData.length === 0) {
                alert("No data available to copy. Please wait for the tickets to load.");
                return;
            }

            // Plain text with Slack-friendly formatting
            const plainContent = lastFetchedData.map(i => {
                const key = i.key;
                const f = i.fields || {};
                const summary = f.summary || "No Summary";
                const status = f.status?.name || "Unknown";
                const notes = ticketComments[key] || "";
                const url = `https://lumberfi.atlassian.net/browse/${key}`;
                return `*${key}* (${url}) : ${summary} - *${status}* => *${notes}*`;
            }).join("\n");

            // HTML content for clickable links and bolding
            const htmlContent = lastFetchedData.map(i => {
                const key = i.key;
                const f = i.fields || {};
                const summary = f.summary || "No Summary";
                const status = f.status?.name || "Unknown";
                const notes = ticketComments[key] || "";
                const url = `https://lumberfi.atlassian.net/browse/${key}`;
                return `<a href="${url}"><b>${key}</b></a>: ${summary} - <b>${status}</b> =&gt; <b>${notes}</b><br>`;
            }).join("");

            const updateButton = () => {
                const originalContent = btn.innerHTML;
                btn.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    Copied!
                `;
                btn.classList.replace('bg-green-600', 'bg-blue-600');

                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-blue-600', 'bg-green-600');
                }, 2000);
            };

            // Try modern Rich Text Clipboard API
            if (navigator.clipboard && window.isSecureContext && window.ClipboardItem) {
                try {
                    const blobHtml = new Blob([htmlContent], { type: "text/html" });
                    const blobText = new Blob([plainContent], { type: "text/plain" });

                    const data = [new ClipboardItem({
                        ["text/html"]: blobHtml,
                        ["text/plain"]: blobText
                    })];

                    navigator.clipboard.write(data).then(updateButton).catch(err => {
                        console.warn('Rich text copy failed, falling back:', err);
                        fallbackCopyTextToClipboard(plainContent, updateButton);
                    });
                } catch (e) {
                    console.error("ClipboardItem Error:", e);
                    fallbackCopyTextToClipboard(plainContent, updateButton);
                }
            } else {
                // Fallback for non-HTTPS or older browsers
                fallbackCopyTextToClipboard(plainContent, updateButton);
            }
        }

        function copyExcelToClipboard(btn) {
            if (!lastFetchedData || lastFetchedData.length === 0) {
                alert("No data available to copy. Please wait for the tickets to load.");
                return;
            }

            const sanitize = (v) => (v == null ? "" : String(v)).replace(/\t/g, " ").replace(/\r?\n/g, " ").trim();
            const customerFromField = (val) => {
                if (!val) return "";
                if (Array.isArray(val) && val.length > 0) {
                    const first = val[0];
                    if (first && typeof first === "object") return first.value || "";
                    return sanitize(first);
                }
                if (val && typeof val === "object") return val.value || "";
                return sanitize(val);
            };

            const header = ["Jira #", "Summary", "Customer", "Dev"].join("\t");
            const lines = lastFetchedData.map(i => {
                const f = i.fields || {};
                const key = sanitize(i.key || "");
                const summary = sanitize(f.summary || "");
                const customer = sanitize(customerFromField(f.customfield_10077));
                const dev = sanitize(f.assignee && f.assignee.displayName ? f.assignee.displayName : "Unassigned");
                return [key, summary, customer, dev].join("\t");
            });
            const tsv = [header, ...lines].join("\n");

            const updateButton = () => {
                const originalContent = btn.innerHTML;
                btn.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    Copied!
                `;
                btn.classList.replace('bg-blue-600', 'bg-green-600');

                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-green-600', 'bg-blue-600');
                }, 2000);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(tsv).then(updateButton).catch(() => {
                    fallbackCopyTextToClipboard(tsv, updateButton);
                });
            } else {
                fallbackCopyTextToClipboard(tsv, updateButton);
            }
        }

        function fallbackCopyTextToClipboard(text, callback) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    callback();
                } else {
                    alert("Unable to copy. Please check browser permissions.");
                }
            } catch (err) {
                console.error('Fallback copy failed:', err);
                alert("Critical error copying to clipboard.");
            }

            document.body.removeChild(textArea);
        }
    </script>
