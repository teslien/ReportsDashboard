{% extends 'base.html' %}
{% block title %}Sprint Tracker{% endblock %}
{% block body_class %}st-page{% endblock %}
{% block main_class %}pt-20 pb-6 px-3 w-full{% endblock %}

{% block extra_head %}
<style>
  body.st-page nav > div { max-width: 100% !important; padding-left: 16px !important; padding-right: 16px !important; }
  body.st-page main { max-width: 100% !important; }
  body.st-page.st-maximized nav { display: none !important; }
  body.st-page.st-maximized main { padding-top: 8px !important; max-width: 100% !important; }
  body.st-page.st-maximized .st-shell { max-height: calc(100vh - 16px); overflow: auto; }
  .st-shell { background: #f8fafc; color: #1e293b; border-radius: 0; border: 1px solid #e2e8f0; overflow: hidden; }
  .st-shell:fullscreen { width: 100vw; height: 100vh; max-height: 100vh; overflow: auto; border-radius: 0; }
  .st-shell:fullscreen .wrapper { overflow: visible; min-height: 100%; }
  .st-shell * { box-sizing: border-box; }
  .st-shell .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; position: relative; top: -1px; }
  .st-shell .chip { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 500; text-decoration: none; white-space: nowrap; margin: 2px 1px; border: 1px solid rgba(0,0,0,0.08); background: #f1f5f9; color: #334155; }
  .st-shell .chip:hover { opacity: 0.85; }
  .st-shell .chip-wrap { display:inline-flex; align-items:center; gap:2px; margin:2px 1px; }
  .st-shell .chip-del {
    border: none;
    background: transparent;
    color: #94a3b8;
    font-size: 11px;
    cursor: pointer;
    line-height: 1;
    padding: 0 2px;
  }
  .st-shell .chip-del:hover { color: #dc2626; }
  .st-shell .drag-handle { cursor: grab; user-select: none; color: #cbd5e1; font-size: 14px; padding: 0 4px; }
  .st-shell .drag-handle:hover { color: #94a3b8; }
  .st-shell tr.dragging-row { opacity: 0.3; }
  .st-shell tr.drag-over-top td { border-top: 2px solid #6366f1 !important; }
  .st-shell tr.drag-over-bottom td { border-bottom: 2px solid #6366f1 !important; }
  .st-shell .below-divider { opacity: 0.5; }
  .st-shell .below-divider td { background: #f8fafc !important; }
  .st-shell .divider-row td { background: #f1f5f9 !important; border-top: 2px dashed #cbd5e1 !important; border-bottom: 2px dashed #cbd5e1 !important; }
  .st-shell .lb-pill { padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid; display: inline-block; transition: all 0.1s; }
  .st-shell .lb-yes { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
  .st-shell .lb-no { background: #f1f5f9; color: #94a3b8; border-color: #e2e8f0; }
  .st-shell .customer-tag { background: #eff6ff; color: #1d4ed8; padding: 2px 7px; border-radius: 8px; font-size: 11px; display: inline-block; margin: 1px; border: 1px solid #bfdbfe; }
  .st-shell [contenteditable] { outline: none; }
  .st-shell [contenteditable]:focus { background: #fefce8; border-radius: 3px; padding: 1px 3px; }
  .st-shell .editable-cell { cursor: text; }
  .st-shell .editable-cell:hover { background: #f0f9ff; border-radius: 3px; }
  .st-shell .pencil { opacity: 0; font-size: 10px; cursor: pointer; color: #94a3b8; transition: opacity 0.15s; margin-left: 4px; }
  .st-shell .theme-row:hover .pencil, .st-shell .goal-wrapper:hover .pencil { opacity: 1; }
  .st-shell .notes-cell { min-width: 220px; max-width: 300px; font-size: 12px; color: #374151; }
  .st-shell .comment-card { border: none; border-radius: 0; background: #f5f5f5; overflow: hidden; box-shadow: none; position: relative; }
  .st-shell .comment-delete { margin-left: auto; border: none; background: transparent; color: #334155; font-size: 10px; font-weight: 600; cursor: pointer; padding: 4px 8px 0 0; opacity: 0.85; display: block; }
  .st-shell .comment-delete:hover { text-decoration: underline; }
  .st-shell .notes-area { min-height: 52px; padding: 8px 10px 18px 10px; font-size: 12px; line-height: 1.5; color: #111827; cursor: text; background: transparent; }
  .st-shell .notes-area:focus { background: rgba(255,255,255,0.35); }
  .st-shell .notes-placeholder { color: #94a3b8; font-style: italic; }
  .st-shell .notes-foot { position: absolute; right: 8px; bottom: 4px; font-size: 9px; color: #475569; opacity: 0.75; display: inline-flex; align-items: center; gap: 4px; pointer-events: none; }
  .st-shell .notes-foot-avatar { width: 12px; height: 12px; border-radius: 50%; background: #cbd5e1; color: #0f172a; display: inline-flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; flex-shrink: 0; }
  .st-shell .note-hover-target { min-height: 52px; position: relative; cursor: pointer; background: transparent; }
  .st-shell .note-hover-plus { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: #cbd5e1; opacity: 0; transition: opacity 0.12s ease, color 0.12s ease; user-select: none; }
  .st-shell .note-hover-target:hover { background: #f8fafc; }
  .st-shell .note-hover-target:hover .note-hover-plus { opacity: 1; color: #94a3b8; }
  .st-shell .tab-btn { padding: 9px 18px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; border-bottom: 3px solid transparent; background: transparent; transition: all 0.15s; color: #64748b; }
  .st-shell .tab-btn.active { border-bottom-color: #6366f1; color: #4f46e5; }
  .st-shell .tab-btn:not(.active):hover { color: #334155; background: #f1f5f9; }
  .st-shell .tab-add { padding: 6px 10px; font-size: 12px; color: #64748b; cursor: pointer; border-radius: 6px; }
  .st-shell .tab-add:hover { background: #e2e8f0; color: #334155; }
  .st-shell .goal-input { font-weight: 600; font-size: 14px; color: #1e293b; min-width: 300px; display: inline-block; }
  .st-shell .goal-input:empty:before { content: "Click to set sprint goal…"; color: #94a3b8; font-weight: 400; }
  .st-shell .summary-bar { font-size: 12px; color: #64748b; }
  .st-shell .badge-done { background: #dcfce7; color: #166534; padding: 1px 7px; border-radius: 8px; font-size: 11px; font-weight: 600; }
  .st-shell .badge-lb { background: #fee2e2; color: #991b1b; padding: 1px 7px; border-radius: 8px; font-size: 11px; font-weight: 600; }
  .st-shell .sync-btn { background: #4f46e5; color: white; border: none; padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .st-shell .sync-btn:hover { background: #4338ca; }
  .st-shell .sync-btn:disabled { background: #a5b4fc; cursor: not-allowed; }
  .st-shell .sync-icon-btn { width: 30px; height: 30px; padding: 0; border-radius: 8px; justify-content: center; font-size: 14px; background: #0f766e; }
  .st-shell .sync-icon-btn:hover { background: #0d685f; }
  .st-shell .sync-status { font-size: 11px; color: #64748b; margin-left: 8px; }
  .st-shell .sync-ok { color: #16a34a; }
  .st-shell .sync-err { color: #dc2626; }
  .st-shell th { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; background: #f8fafc; padding: 8px 10px; border-bottom: 1px solid #e2e8f0; text-align: left; position: sticky; top: 0; z-index: 1; }
  .st-shell td { padding: 9px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: top; font-size: 13px; color: #1e293b; background: #fff; }
  .st-shell tr:last-child td { border-bottom: none; }
  .st-shell .legend-toggle { font-size: 12px; color: #6366f1; cursor: pointer; user-select: none; }
  .st-shell .legend-toggle:hover { text-decoration: underline; }
  .st-shell .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .st-shell .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #c7d2fe; border-top-color: white; border-radius: 50%; animation: st-spin 0.6s linear infinite; }
  @keyframes st-spin { to { transform: rotate(360deg); } }
  .st-shell .saved-badge { font-size: 11px; color: #94a3b8; margin-left: 6px; }

  /* Error / success toast banner */
  #st-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    z-index: 9999;
    min-width: 320px;
    max-width: calc(100vw - 32px);
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    box-shadow: 0 6px 24px rgba(15, 23, 42, 0.18);
    padding: 0;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  #st-toast.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  #st-toast-bar {
    height: 4px;
    width: 100%;
  }
  #st-toast-bar.error { background: #dc2626; }
  #st-toast-bar.ok    { background: #16a34a; }
  #st-toast-body {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
  }
  #st-toast-icon {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
  }
  #st-toast-icon.error { background: #fee2e2; color: #dc2626; }
  #st-toast-icon.ok    { background: #dcfce7; color: #16a34a; }
  #st-toast-text {
    flex: 1;
    min-width: 0;
  }
  #st-toast-title {
    font-size: 13px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 2px;
  }
  #st-toast-detail {
    font-size: 12px;
    color: #475569;
    line-height: 1.45;
    word-break: break-word;
  }
  #st-toast-close {
    flex-shrink: 0;
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px 0 0 4px;
    transition: color 0.1s;
  }
  #st-toast-close:hover { color: #334155; }
  .st-shell .theme-sentence { font-size: 13px; font-weight: 500; color: #1e293b; line-height: 1.4; }
  .st-shell .bullet-list { list-style: none; padding: 0; margin: 0; }
  .st-shell .bullet-list li { font-size: 12px; color: #475569; line-height: 1.5; padding-left: 12px; position: relative; margin-bottom: 3px; }
  .st-shell .bullet-list li:before { content: "•"; position: absolute; left: 0; color: #94a3b8; }
  .st-shell .row-actions { display: inline-flex; gap: 6px; margin-left: 6px; }
  .st-shell .row-actions button { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 12px; }
  .st-shell .row-actions button:hover { color: #dc2626; }
  .st-shell .btn-ghost { font-size: 12px; color: #4f46e5; background: #eef2ff; border: 1px solid #c7d2fe; padding: 4px 10px; border-radius: 6px; cursor: pointer; }
  .st-shell .btn-ghost:hover { background: #e0e7ff; }
  .st-shell .st-add-bullet-btn,
  .st-shell .st-add-ticket-btn { opacity: 0; pointer-events: none; transition: opacity 0.15s ease; }
  .st-shell .st-cell-bullets:hover .st-add-bullet-btn,
  .st-shell .st-cell-tickets:hover .st-add-ticket-btn { opacity: 1; pointer-events: auto; }
  .st-shell .ticket-bullets { margin-top: 4px; padding-left: 2px; font-size: 11px; color: #475569; }
  .st-shell .ticket-bullets li { list-style: disc; margin-left: 14px; margin-bottom: 2px; }
  .st-shell .wrapper { background: #fff; border-radius: 0; overflow: hidden; border: 1px solid #e2e8f0; box-shadow: 0 1px 2px rgba(15,23,42,0.04); }
  .st-dialog-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.45); display: none; align-items: center; justify-content: center; z-index: 1100; }
  .st-dialog-backdrop.open { display: flex; }
  .st-dialog { width: min(560px, calc(100vw - 24px)); background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 12px 40px rgba(15, 23, 42, 0.28); }
  .st-dialog-header { padding: 14px 16px 10px; border-bottom: 1px solid #f1f5f9; }
  .st-dialog-title { font-size: 15px; font-weight: 700; color: #0f172a; }
  .st-dialog-body { padding: 12px 16px; color: #334155; font-size: 13px; }
  .st-dialog-message { margin-bottom: 10px; color: #475569; }
  .st-dialog-fields { display: flex; flex-direction: column; gap: 8px; }
  .st-dialog-field label { display: block; font-size: 12px; color: #475569; margin-bottom: 4px; }
  .st-dialog-field input, .st-dialog-field textarea { width: 100%; border: 1px solid #dbeafe; background: #f8fafc; color: #0f172a; border-radius: 8px; font-size: 13px; padding: 8px 10px; outline: none; }
  .st-dialog-field input:focus, .st-dialog-field textarea:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15); background: #fff; }
  .st-dialog-actions { padding: 10px 16px 14px; border-top: 1px solid #f1f5f9; display: flex; justify-content: flex-end; gap: 8px; }
  .st-dialog-btn { border: 1px solid #cbd5e1; background: #fff; color: #334155; border-radius: 8px; font-size: 12px; font-weight: 600; padding: 7px 12px; cursor: pointer; }
  .st-dialog-btn:hover { background: #f8fafc; }
  .st-dialog-btn.primary { background: #4f46e5; border-color: #4f46e5; color: #fff; }
  .st-dialog-btn.primary:hover { background: #4338ca; }
  .st-dialog-btn.danger { background: #dc2626; border-color: #dc2626; color: #fff; }
  .st-dialog-btn.danger:hover { background: #b91c1c; }
  .st-loader-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.35); backdrop-filter: blur(1px); display: none; align-items: center; justify-content: center; z-index: 1200; }
  .st-loader-overlay.open { display: flex; }
  .st-loader-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px 16px; display: inline-flex; align-items: center; gap: 10px; color: #334155; font-size: 13px; box-shadow: 0 10px 32px rgba(15,23,42,0.2); }
  .st-loader-spinner { width: 16px; height: 16px; border: 2px solid #c7d2fe; border-top-color: #4f46e5; border-radius: 50%; animation: st-spin 0.7s linear infinite; }
</style>
{% endblock %}

{% block content %}
<div class="st-shell">
  <div id="st-app" class="wrapper"></div>
</div>

<!-- Global error / success toast -->
<div id="st-toast" role="alert" aria-live="assertive" aria-atomic="true">
  <div id="st-toast-bar" class="error"></div>
  <div id="st-toast-body">
    <div id="st-toast-icon" class="error">✕</div>
    <div id="st-toast-text">
      <div id="st-toast-title">Error</div>
      <div id="st-toast-detail"></div>
    </div>
    <button id="st-toast-close" aria-label="Dismiss">✕</button>
  </div>
</div>

<div id="st-dialog-backdrop" class="st-dialog-backdrop">
  <div class="st-dialog" role="dialog" aria-modal="true" aria-labelledby="st-dialog-title">
    <div class="st-dialog-header">
      <div id="st-dialog-title" class="st-dialog-title">Dialog</div>
    </div>
    <div class="st-dialog-body">
      <div id="st-dialog-message" class="st-dialog-message"></div>
      <div id="st-dialog-fields" class="st-dialog-fields"></div>
    </div>
    <div class="st-dialog-actions">
      <button id="st-dialog-cancel" class="st-dialog-btn" type="button">Cancel</button>
      <button id="st-dialog-confirm" class="st-dialog-btn primary" type="button">Confirm</button>
    </div>
  </div>
</div>
<div id="st-loader-overlay" class="st-loader-overlay" aria-live="polite" aria-busy="true">
  <div class="st-loader-card">
    <span class="st-loader-spinner"></span>
    <span id="st-loader-text">Loading...</span>
  </div>
</div>

<script>
(function(){
  // ─── Constants ──────────────────────────────────────────────
  const JIRA_BASE = (window.JIRA_DOMAIN || "").replace(/\/$/, "") + "/browse/";
  const CAN_MANAGE = {{ 'true' if can_manage_sprint_tracker else 'false' }};
  const STATUS_COLORS = {
    "Done":"#0891b2","Resolved":"#0891b2","Deployed":"#0891b2",
    "In Development":"#d97706","In Progress":"#d97706",
    "Ready for Dev":"#6366f1","Ready for Dev Review":"#8b5cf6",
    "Ready for Internal Demo":"#0ea5e9","Ready for QA":"#a855f7",
    "Ready for Design":"#f59e0b","Dev Corrections Needed":"#f97316",
    "Open":"#94a3b8","On Hold":"#7c3aed"
  };

  // ─── State ──────────────────────────────────────────────────
  let sprints = [];        // [{id,name,sprint_goal,goal_edited,divider_index,themes:[...]}]
  let activeSprintId = null;
  let anthropicKey = "";
  let hasConfiguredAnthropicKey = false;
  let rewriteOnSync = true;
  let pendingRequests = 0;

  // ─── Helpers ────────────────────────────────────────────────
  const esc = s => (s == null ? "" : String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"));
  const $ = sel => document.querySelector(sel);
  const activeSprint = () => sprints.find(s => s.id === activeSprintId) || sprints[0];
  const dialogState = { resolver: null, escHandler: null };

  function closeDialog(payload) {
    const backdrop = document.getElementById("st-dialog-backdrop");
    backdrop.classList.remove("open");
    if (dialogState.escHandler) {
      document.removeEventListener("keydown", dialogState.escHandler);
      dialogState.escHandler = null;
    }
    if (dialogState.resolver) {
      dialogState.resolver(payload);
      dialogState.resolver = null;
    }
  }

  function showDialog(options) {
    const opts = Object.assign({
      title: "Confirm",
      message: "",
      confirmText: "Confirm",
      cancelText: "Cancel",
      danger: false,
      fields: [],
    }, options || {});
    const backdrop = document.getElementById("st-dialog-backdrop");
    const titleEl = document.getElementById("st-dialog-title");
    const msgEl = document.getElementById("st-dialog-message");
    const fieldsEl = document.getElementById("st-dialog-fields");
    const cancelBtn = document.getElementById("st-dialog-cancel");
    const confirmBtn = document.getElementById("st-dialog-confirm");

    titleEl.textContent = opts.title;
    msgEl.textContent = opts.message || "";
    msgEl.style.display = opts.message ? "block" : "none";

    fieldsEl.innerHTML = (opts.fields || []).map((f, i) => `
      <div class="st-dialog-field">
        <label for="st-dialog-field-${i}">${esc(f.label || f.name || `Field ${i + 1}`)}</label>
        ${f.multiline
          ? `<textarea id="st-dialog-field-${i}" data-name="${esc(f.name || `field_${i}`)}" rows="${f.rows || 3}" placeholder="${esc(f.placeholder || "")}">${esc(f.value || "")}</textarea>`
          : `<input id="st-dialog-field-${i}" data-name="${esc(f.name || `field_${i}`)}" type="${esc(f.type || "text")}" value="${esc(f.value || "")}" placeholder="${esc(f.placeholder || "")}" />`}
      </div>
    `).join("");

    cancelBtn.textContent = opts.cancelText || "Cancel";
    confirmBtn.textContent = opts.confirmText || "Confirm";
    confirmBtn.className = `st-dialog-btn ${opts.danger ? "danger" : "primary"}`;

    backdrop.classList.add("open");
    const firstInput = fieldsEl.querySelector("input, textarea");
    if (firstInput) firstInput.focus();
    else confirmBtn.focus();

    return new Promise((resolve) => {
      dialogState.resolver = resolve;

      cancelBtn.onclick = () => closeDialog({ confirmed: false, values: {} });
      confirmBtn.onclick = () => {
        const values = {};
        fieldsEl.querySelectorAll("[data-name]").forEach((el) => {
          values[el.dataset.name] = el.value.trim();
        });
        closeDialog({ confirmed: true, values });
      };
      backdrop.onclick = (e) => {
        if (e.target === backdrop) closeDialog({ confirmed: false, values: {} });
      };
      dialogState.escHandler = (e) => {
        if (e.key === "Escape") closeDialog({ confirmed: false, values: {} });
      };
      document.addEventListener("keydown", dialogState.escHandler);
    });
  }

  function setLoader(open, text) {
    const overlay = document.getElementById("st-loader-overlay");
    const textEl = document.getElementById("st-loader-text");
    if (!overlay) return;
    if (textEl && text) textEl.textContent = text;
    overlay.classList.toggle("open", !!open);
  }

  // ─── Toast ─────────────────────────────────────────────────
  let _toastTimer = null;
  function showToast(type, title, detail, durationMs) {
    const toast   = document.getElementById("st-toast");
    const bar     = document.getElementById("st-toast-bar");
    const icon    = document.getElementById("st-toast-icon");
    const ttl     = document.getElementById("st-toast-title");
    const det     = document.getElementById("st-toast-detail");
    if (!toast) return;
    bar.className  = type;   // "error" or "ok"
    icon.className = type;
    icon.textContent = type === "ok" ? "✓" : "✕";
    ttl.textContent  = title;
    det.textContent  = detail || "";
    det.style.display = detail ? "" : "none";
    toast.classList.add("visible");
    if (_toastTimer) clearTimeout(_toastTimer);
    const dur = durationMs ?? (type === "error" ? 0 : 3500);
    if (dur > 0) _toastTimer = setTimeout(() => toast.classList.remove("visible"), dur);
  }
  document.addEventListener("DOMContentLoaded", () => {
    const btn = document.getElementById("st-toast-close");
    if (btn) btn.addEventListener("click", () => {
      const t = document.getElementById("st-toast");
      if (t) t.classList.remove("visible");
      if (_toastTimer) clearTimeout(_toastTimer);
    });
  });

  // ─── API helper ────────────────────────────────────────────
  async function api(path, opts={}) {
    const finalOpts = Object.assign({
      method: "GET",
      headers: { "Content-Type": "application/json" }
    }, opts);
    const silent = !!finalOpts.silent;
    const loaderText = finalOpts.loaderText || "Processing request...";
    delete finalOpts.silent;
    delete finalOpts.loaderText;
    if (!silent) {
      pendingRequests += 1;
      setLoader(true, loaderText);
    }
    try {
      const res = await fetch(path, finalOpts);
      if (!res.ok) {
        let msg = `Request failed (${res.status})`;
        let detail = "";
        try {
          const d = await res.json();
          if (d.error)  msg    = d.error;
          if (d.detail) detail = d.detail;
        } catch(_) {
          try {
            const txt = await res.text();
            if (txt && txt.length < 400) detail = txt;
          } catch(__) {}
        }
        const err = new Error(msg);
        err.detail = detail;
        throw err;
      }
      return res.json();
    } finally {
      if (!silent) {
        pendingRequests = Math.max(0, pendingRequests - 1);
        if (pendingRequests === 0) setLoader(false);
      }
    }
  }

  function statusDot(status) {
    const col = STATUS_COLORS[status] || STATUS_COLORS["Open"];
    return `<span class="status-dot" style="background:${col};" title="${esc(status)}"></span>`;
  }

  function themeLB(theme) {
    if (theme.lb_override !== null && theme.lb_override !== undefined) return !!theme.lb_override;
    return (theme.tickets || []).some(t => t.lb);
  }
  function themeCustomers(theme) {
    const set = new Set();
    (theme.tickets || []).forEach(t => (t.customers || []).forEach(c => set.add(c)));
    return [...set];
  }

  function initials(name) {
    const s = String(name || "").trim();
    if (!s) return "?";
    const parts = s.split(/\s+/).filter(Boolean);
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[1][0]).toUpperCase();
  }

  function formatWhen(iso) {
    if (!iso) return "just now";
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return "just now";
    return d.toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
  }

    let html = "";

      html += themeRow(sprint, theme, idx >= divIdx);

    if (divIdx >= order.length) html += dividerRow();
    return html || `<tr><td colspan="8" class="text-center py-6 text-slate-400">${CAN_MANAGE ? 'No themes yet. Click "+ Theme" to add one.' : 'No themes available in this sprint yet.'}</td></tr>`;

  // ─── Event handlers ────────────────────────────────────────
  async function onCellBlur(e) {
    if (!CAN_MANAGE) return;
    const el = e.target;
    const themeId = parseInt(el.dataset.themeid, 10);
    const field = el.dataset.field;
    const sprint = activeSprint();
    const theme = (sprint.themes || []).find(t => t.id === themeId);
    if (!theme) return;
    let payload = {};
    if (field === "notes") {
      const val = el.textContent.trim();
      theme.notes = val; payload.notes = val;
    } else if (field === "sentence") {
      const val = el.textContent.trim();
      theme.sentence = val; payload.sentence = val;
    } else if (field === "epic_name") {
      const val = el.textContent.trim();
      theme.epic_name = val; payload.epic_name = val;
    }
    if (!Object.keys(payload).length) return;
    try {
      const res = await api(`/api/sprint_tracker/themes/${themeId}`, { method: "PUT", body: JSON.stringify(payload) });
      if (field === "notes") {
        theme.notes_updated_by = res.notes_updated_by || theme.notes_updated_by || "";
        theme.notes_updated_at = res.notes_updated_at || new Date().toISOString();
        renderTab();
      }
      markSaved();
    } catch(err) { flashError(err.message, err.detail); }
  }

  async function onToggleLB(themeId) {
    if (!CAN_MANAGE) return;
    const sprint = activeSprint();
    const theme = sprint.themes.find(t => t.id === themeId); if (!theme) return;
    const cur = themeLB(theme);
    const next = !cur;
    theme.lb_override = next;
    try {
      await api(`/api/sprint_tracker/themes/${themeId}`, { method: "PUT", body: JSON.stringify({ lb_override: next }) });
      renderTab();
    } catch(e) { flashError(e.message, e.detail); }
  }

  async function onDeleteTheme(themeId) {
    if (!CAN_MANAGE) return;
    const result = await showDialog({
      title: "Delete Theme",
      message: "Delete this theme and all its tickets?",
      confirmText: "Delete",
      danger: true,
    });
    if (!result.confirmed) return;
    try {
      await api(`/api/sprint_tracker/themes/${themeId}`, { method: "DELETE" });
      const sprint = activeSprint();
      sprint.themes = sprint.themes.filter(t => t.id !== themeId);
      renderTab();
    } catch(e) { flashError(e.message, e.detail); }

      message: "Enter sprint name and Jira JQL. We will fetch tickets, generate themes via Claude, then ask confirmation.",
      confirmText: "Preview Sprint",
      fields: [
        { name: "sprint_name", label: "Sprint Name", placeholder: "e.g. PR 0502" },
        { name: "jql", label: "JQL Query", placeholder: "project = TIM AND sprint in openSprints()", multiline: true, rows: 4 }
      ]
    });
    if (!inputDialog.confirmed) return;
    const sprintName = (inputDialog.values.sprint_name || "").trim();
    const jql = (inputDialog.values.jql || "").trim();
    if (!sprintName || !jql) {
      flashError("Sprint name and JQL are required.");
      return;
    }
    const key = await ensureAnthropicKeyWithDialog("Anthropic API key is required to generate theme sentences and bullets from JQL results.");
    if (!key && !hasConfiguredAnthropicKey) return;

    try {
      const preview = await api("/api/sprint_tracker/jql/preview", {
        method: "POST",
        body: JSON.stringify({ jql, anthropic_api_key: key || "" }),
        loaderText: "Fetching Jira tickets and generating themes..."
      });
      const previewText = [
        `Tickets fetched: ${preview.ticket_count}`,
        `Themes generated: ${preview.theme_count}`,
        `Inferred sprint goal: ${preview.sprint_goal}`,
        "",
        "Themes:",
        ...(preview.themes || []).slice(0, 8).map(t => `- ${t.epic_name || t.theme_key} (${(t.tickets || []).length} tickets)`),
      ].join("\n");
      const confirmDialog = await showDialog({
        title: "Confirm Generated Sprint",
        message: "Review details and confirm sprint creation.",
        confirmText: "Create Sprint",
        fields: [
          { name: "sprint_name", label: "Sprint Name", value: sprintName },
          { name: "sprint_goal", label: "Sprint Goal", value: preview.sprint_goal || "", multiline: true, rows: 2 },
          { name: "preview", label: "Preview (read-only copy)", value: previewText, multiline: true, rows: 10 },
        ]
      });
      if (!confirmDialog.confirmed) return;
      const finalSprintName = (confirmDialog.values.sprint_name || "").trim();
      const finalSprintGoal = (confirmDialog.values.sprint_goal || "").trim();
      if (!finalSprintName) {
        flashError("Sprint name is required.");
        return;
      }

      const created = await api("/api/sprint_tracker/sprints/from_generated", {
        method: "POST",
        body: JSON.stringify({
          sprint_name: finalSprintName,
          sprint_goal: finalSprintGoal,
          themes: preview.themes || []
        }),
        loaderText: "Creating sprint and importing tickets..."
      });
      activeSprintId = created.sprint_id;
      await load();
      flashOk(`Created sprint "${finalSprintName}" from JQL`);
    } catch (e) {
      flashError(e.message, e.detail);
    }
  }

  window.stAddBullet = async function(themeId) {
    if (!CAN_MANAGE) return;
    const sprint = activeSprint();
    const theme = sprint.themes.find(t => t.id === themeId); if (!theme) return;
    const result = await showDialog({
      title: "Add Bullet",
      message: `Add a new bullet for "${theme.epic_name || theme.theme_key}".`,
      confirmText: "Add Bullet",
      fields: [{ name: "bullet", label: "Bullet Text", multiline: true, rows: 3 }],
    });
    const val = (result.values.bullet || "").trim();
    if (!result.confirmed || !val) return;
    const bullets = [...(theme.bullets || []), val];
    theme.bullets = bullets;
    try {
      await api(`/api/sprint_tracker/themes/${themeId}`, { method: "PUT", body: JSON.stringify({ bullets }) });
      renderTab();
    } catch(e) { flashError(e.message, e.detail); }
  };

  window.stAddTicket = async function(themeId) {
    if (!CAN_MANAGE) return;
    const result = await showDialog({
      title: "Add Ticket",
      message: "Add a ticket to this theme.",
      confirmText: "Add Ticket",
      fields: [
        { name: "key", label: "Ticket Key", placeholder: "TIM-1234" },
        { name: "summary", label: "Summary (optional)", multiline: true, rows: 2 },
      ],
    });
    const key = (result.values.key || "").trim();
    if (!result.confirmed || !key) return;
    const summary = (result.values.summary || "").trim();
    try {
      await api(`/api/sprint_tracker/tickets`, {
        method: "POST",
        body: JSON.stringify({ theme_id: themeId, ticket_key: key, summary, status: "Open", customers: [], lb: false })
      });
      await load();
    } catch(e) { flashError(e.message, e.detail); }
  };

  window.stDeleteTicket = async function(ticketId) {
    if (!CAN_MANAGE) return;
    const d = await showDialog({
      title: "Remove Ticket",
      message: "Remove this ticket from the row?",
      confirmText: "Remove",
      danger: true
    });
    if (!d.confirmed) return;
    try {
      await api(`/api/sprint_tracker/tickets/${ticketId}`, { method: "DELETE" });
      await load();
      flashOk("Ticket removed");
    } catch (e) {
      flashError(e.message, e.detail);
    }
  };

  function parseTicketKeys(input) {
    return [...new Set(
      String(input || "")
        .split(/[\n,\s]+/)
        .map(s => s.trim().toUpperCase())
        .filter(Boolean)
    )];
  }

  async function ensureAnthropicKeyWithDialog(message) {
    if (anthropicKey || hasConfiguredAnthropicKey) return anthropicKey;
    const result = await showDialog({
      title: "Anthropic API Key Required",
      message: (message ? message + " " : "") + "The key is managed in Settings. Ask an admin to add it under Settings → Anthropic API Key.",
      confirmText: "Open Settings",
      cancelText: "Close",
      fields: [],
    });
    if (result.confirmed) {
      window.location.href = "/settings";
    }
    return "";
  }

  async function promptCreateRowFromTickets() {
    if (!CAN_MANAGE) return;
    const sprint = activeSprint(); if (!sprint) return;
    const inputDialog = await showDialog({
      title: "Create Theme From Tickets",
      message: "Paste Jira ticket keys (comma, space, or newline separated). We will fetch details, ask Claude to generate theme title/description, then ask for your confirmation.",
      confirmText: "Generate Theme",
      fields: [{
        name: "ticket_keys",
        label: "Ticket Keys",
        placeholder: "TIM-1234, TIM-5678",
        multiline: true,
        rows: 5
      }]
    });
    if (!inputDialog.confirmed) return;
    const ticketKeys = parseTicketKeys(inputDialog.values.ticket_keys);
    if (!ticketKeys.length) {
      flashError("Please provide at least one ticket key.");
      return;
    }

    const key = await ensureAnthropicKeyWithDialog(
      "Anthropic API key is needed to generate theme title and summary from ticket descriptions."
    );
    if (!key && !hasConfiguredAnthropicKey) return;

    try {
      const generated = await api("/api/sprint_tracker/themes/generate_from_tickets", {
        method: "POST",
        body: JSON.stringify({
          ticket_keys: ticketKeys,
          anthropic_api_key: key || ""
        })
      });

      const suggestion = generated.suggestion || {};
      const confirmDialog = await showDialog({
        title: "Confirm Generated Theme",
        message: `Fetched ${generated.fetched || ticketKeys.length} tickets. Review/edit before creating row.`,
        confirmText: "Create Row",
        fields: [
          { name: "theme_key", label: "Theme Key", value: suggestion.theme_key || "generated-theme" },
          { name: "epic_name", label: "Theme Title", value: suggestion.epic_name || "Generated Theme" },
          { name: "sentence", label: "What We're Building", value: suggestion.sentence || "", multiline: true, rows: 2 },
          {
            name: "bullets",
            label: "Bullets (one per line)",
            value: (suggestion.bullets || []).join("\n"),
            multiline: true,
            rows: 4
          }
        ]
      });
      if (!confirmDialog.confirmed) return;

      const finalThemeKey = (confirmDialog.values.theme_key || "").trim();
      if (!finalThemeKey) {
        flashError("Theme key is required.");
        return;
      }
      const finalBullets = String(confirmDialog.values.bullets || "")
        .split("\n")
        .map(x => x.trim())
        .filter(Boolean)
        .slice(0, 6);

      const themeRes = await api(`/api/sprint_tracker/themes`, {
        method: "POST",
        body: JSON.stringify({
          sprint_id: sprint.id,
          theme_key: finalThemeKey,
          epic_name: (confirmDialog.values.epic_name || "").trim(),
          sentence: (confirmDialog.values.sentence || "").trim(),
          bullets: finalBullets
        })
      });

      const themeId = themeRes.id;
      const tickets = generated.tickets || ticketKeys.map(k => ({ ticket_key: k, summary: "", status: "Open", customers: [], lb: false }));
      for (const t of tickets) {
        await api(`/api/sprint_tracker/tickets`, {
          method: "POST",
          body: JSON.stringify({
            theme_id: themeId,
            ticket_key: t.ticket_key,
            summary: t.summary || "",
            status: t.status || "Open",
            customers: t.customers || [],
            lb: !!t.lb
          })
        });
      }

      await load();
      flashOk(`Created row with ${tickets.length} tickets`);
    } catch (e) {
      flashError(e.message, e.detail);
    }
  }

  // Persist bullet edits on blur (delegated)
  document.addEventListener("blur", async (e) => {
    if (!CAN_MANAGE) return;
    const el = e.target;
    if (!el || !el.classList || !el.classList.contains("st-bullet")) return;
    const ul = el.closest("ul[data-themeid]"); if (!ul) return;
    const themeId = parseInt(ul.dataset.themeid, 10);
    const bullets = [...ul.querySelectorAll(".st-bullet")].map(li => li.textContent.trim()).filter(Boolean);
    const sprint = activeSprint();
    const theme = sprint.themes.find(t => t.id === themeId); if (!theme) return;
    theme.bullets = bullets;
    try {
      await api(`/api/sprint_tracker/themes/${themeId}`, { method: "PUT", body: JSON.stringify({ bullets }) });
      markSaved();
    } catch(err) { flashError(err.message, err.detail); }
  }, true);

  async function onRewriteTicket(ticketId) {
    if (!CAN_MANAGE) return;
    if (!anthropicKey) {
      const k = await ensureAnthropicKeyWithDialog("Enter your key to rewrite ticket description into max three bullets.");
      if (!k && !hasConfiguredAnthropicKey) return;
    }
    try {
      const res = await api(`/api/sprint_tracker/tickets/${ticketId}/rewrite`, {
        method: "POST",
        body: JSON.stringify({ anthropic_api_key: anthropicKey || "" })
      });
      await load();
      flashOk(`Rewrote ${res.description_bullets?.length || 0} bullets`);
    } catch(e) { flashError(e.message, e.detail); }
  }

  async function onSyncFromJql() {
    if (!CAN_MANAGE) return;
    const sprint = activeSprint(); if (!sprint) return;
    const cacheKey = `st_sync_jql_${sprint.id}`;
    const prevJql = localStorage.getItem(cacheKey) || `project = "{{ project }}" AND sprint = ${sprint.id}`;
    const d = await showDialog({
      title: "Sync from JQL",
      message: "This sync updates ticket status/details and adds new tickets from JQL. Claude rewrite is NOT used.",
      confirmText: "Run Sync",
      fields: [{ name: "jql", label: "JQL Query", value: prevJql, multiline: true, rows: 4 }]
    });
    if (!d.confirmed) return;
    const jql = (d.values.jql || "").trim();
    if (!jql) {
      flashError("JQL is required");
      return;
    }
    localStorage.setItem(cacheKey, jql);
    const btn = document.getElementById("st-sync-jql-btn");
    const statusEl = document.getElementById("st-sync-status");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    statusEl.textContent = "";
    try {
      const res = await api(`/api/sprint_tracker/sprints/${sprint.id}/sync_jql`, {
        method: "POST",
        body: JSON.stringify({ jql })
      });
      await load();
      const now = new Date();
      statusEl.className = "sync-status sync-ok";
      statusEl.textContent = `JQL sync: ${res.updated || 0} updated, ${res.inserted || 0} inserted, ${res.removed || 0} removed (${res.total_fetched || 0} fetched) at ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    } catch(e) {
      statusEl.className = "sync-status sync-err";
      statusEl.textContent = `JQL sync failed: ${e.message}`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '⇄';
    }
  }

  async function toggleMaximize() {
    const btn = document.getElementById("st-maximize-btn");
    try {
      if (document.fullscreenElement) {
        await document.exitFullscreen();
      } else {
        const shell = document.querySelector(".st-shell") || document.documentElement;
        if (shell.requestFullscreen) await shell.requestFullscreen();
        else document.body.classList.toggle("st-maximized");
      }
    } catch(_) {
      document.body.classList.toggle("st-maximized");
    }
    updateMaximizeBtn();
    if (btn) btn.blur();
  }

  function updateMaximizeBtn() {
    const btn = document.getElementById("st-maximize-btn");
    if (!btn) return;
    const isFull = !!document.fullscreenElement || document.body.classList.contains("st-maximized");
    btn.textContent = isFull ? "🗗 Exit Maximize" : "⛶ Maximize";
  }

  async function loadAnthropicKey() {
    if (!CAN_MANAGE) return;
    try {
      const res = await fetch("/api/settings/app_config");
      if (res.ok) {
        const data = await res.json();
        if (data && data.anthropic_api_key) {
          anthropicKey = data.anthropic_api_key;
          hasConfiguredAnthropicKey = true;
        } else if (data && typeof data.anthropic_api_key_configured !== "undefined") {
          hasConfiguredAnthropicKey = !!data.anthropic_api_key_configured;
        }
      }
    } catch(_) {}
  }

  // ─── Drag and Drop ─────────────────────────────────────────
  let dragSrc = null, dragSrcType = null;
  function attachDragAndDrop() {
    const tbody = document.getElementById("st-tbody"); if (!tbody) return;
    tbody.querySelectorAll("tr").forEach(tr => {
      tr.addEventListener("dragstart", (e) => {
        dragSrc = tr; dragSrcType = tr.dataset.type;
        e.dataTransfer.effectAllowed = "move";
        setTimeout(() => tr.classList.add("dragging-row"), 0);
      });
      tr.addEventListener("dragover", (e) => {
        e.preventDefault(); e.dataTransfer.dropEffect = "move";
        if (tr === dragSrc) return;
        const rect = tr.getBoundingClientRect();
        const mid = rect.top + rect.height/2;
        clearDragIndicators();
        if (e.clientY < mid) tr.classList.add("drag-over-top");
        else tr.classList.add("drag-over-bottom");
      });
      tr.addEventListener("drop", async (e) => {
        e.preventDefault(); clearDragIndicators();
        if (!dragSrc || tr === dragSrc) { if (dragSrc) dragSrc.classList.remove("dragging-row"); dragSrc = null; return; }

        const sprint = activeSprint();
        const order = sprint.themes.slice().sort((a,b) => a.sort_order - b.sort_order);
        const DIVIDER = -1;
        let display = [];
        for (let i = 0; i <= order.length; i++) {
          if (i === sprint.divider_index) display.push(DIVIDER);
          if (i < order.length) display.push(order[i].id);
        }

        const srcId = dragSrcType === "divider" ? DIVIDER : parseInt(dragSrc.dataset.themeid, 10);
        const tgtId = tr.dataset.type === "divider" ? DIVIDER : parseInt(tr.dataset.themeid, 10);
        let srcIdx = display.indexOf(srcId);
        display.splice(srcIdx, 1);
        let tgtIdx = display.indexOf(tgtId);
        const rect = tr.getBoundingClientRect();
        const insertAfter = e.clientY >= rect.top + rect.height/2;
        const insertAt = insertAfter ? tgtIdx + 1 : tgtIdx;
        display.splice(insertAt, 0, srcId);

        const newIds = display.filter(x => x !== DIVIDER);
        const newDiv = display.indexOf(DIVIDER);
        sprint.divider_index = newDiv === -1 ? newIds.length : newDiv;
        // apply sort orders locally
        newIds.forEach((id, i) => {
          const t = sprint.themes.find(t => t.id === id);
          if (t) t.sort_order = i;
        });

        try {
          await api(`/api/sprint_tracker/sprints/${sprint.id}/reorder`, {
            method: "POST",
            body: JSON.stringify({ theme_ids: newIds, divider_index: sprint.divider_index })
          });
          markSaved();
        } catch(err) { flashError(err.message, err.detail); }
        renderTab();
      });
      tr.addEventListener("dragend", () => { clearDragIndicators(); if (dragSrc) dragSrc.classList.remove("dragging-row"); dragSrc = null; });
    });
  }
  function clearDragIndicators() {
    document.querySelectorAll(".drag-over-top").forEach(el => el.classList.remove("drag-over-top"));
    document.querySelectorAll(".drag-over-bottom").forEach(el => el.classList.remove("drag-over-bottom"));
  }

  // ─── Saved / error badges ─────────────────────────────────
  function markSaved() {
    const el = document.getElementById("st-saved"); if (!el) return;
    const t = new Date();
    el.textContent = `Saved ${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`;
    el.style.color = "#16a34a";
  }
  function flashError(msg, detail) {
    // Also update the small saved badge for inline context
    const el = document.getElementById("st-saved");
    if (el) { el.textContent = "Error"; el.style.color = "#dc2626"; }
    const det = detail || (msg && msg.detail) || "";
    const text = (typeof msg === "object" && msg instanceof Error) ? msg.message : String(msg || "Unknown error");
    showToast("error", text, det);
  }
  function flashOk(msg) {
    const el = document.getElementById("st-saved");
    if (el) { el.textContent = msg; el.style.color = "#16a34a"; }
    showToast("ok", msg, "", 3500);
  }

  // ─── Init ─────────────────────────────────────────────────
  (async function init(){
    await loadAnthropicKey();
    document.addEventListener("fullscreenchange", updateMaximizeBtn);
    try {
      await load();
      updateMaximizeBtn();
    } catch(e) {
      document.getElementById("st-app").innerHTML =
        `<div class="px-5 py-8 text-center text-red-600">Failed to load sprint tracker: ${esc(e.message)}</div>`;
    }
  })();
})();
</script>
