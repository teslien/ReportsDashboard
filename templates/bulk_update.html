<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Bulk Update - {{ project }}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Select2 CSS/JS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        /* Glassmorphism */
        .glass {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Custom Dark Theme for Select2 */
        .select2-container--default .select2-selection--single {
            background-color: #1f2937;
            border: 1px solid #374151;
            color: white;
            height: 42px;
            display: flex;
            align-items: center;
        }

        .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: #d1d5db;
            padding-left: 12px;
        }

        .select2-dropdown {
            background-color: #1f2937;
            border: 1px solid #374151;
            color: #d1d5db;
        }

        .select2-results__option--highlighted {
            background-color: #2563eb !important;
            color: white !important;
        }

        .select2-results__option--selected {
            background-color: #374151 !important;
            color: white !important;
        }

        .select2-results__option[aria-selected=true] {
            background-color: #374151 !important;
            color: white !important;
        }
    </style>
    <link rel="stylesheet" href="/static/theme.css">
    <script src="/static/theme.js"></script></head>

<body class="bg-gray-900 min-h-screen text-white font-sans">

    <!-- Navigation -->
    {% include 'navbar.html' %}

    <!-- Main Content -->
    <main class="pt-24 pb-12 px-6 max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Bulk Update Tickets</h1>

        <div class="glass p-8 rounded-2xl border border-gray-700 shadow-xl">
            <div class="space-y-6">
                <!-- Ticket Keys -->
                <div>
                    <label class="block text-sm font-bold text-gray-400 mb-2">Ticket Keys (one per line or comma
                        separated)</label>
                    <textarea id="issueKeys" rows="5"
                        class="w-full bg-gray-800 text-white rounded-xl p-4 border border-gray-700 focus:border-blue-500 outline-none transition font-mono"
                        placeholder="TIM-1&#10;TIM-2, TIM-3"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Field Selection -->
                    <div>
                        <label class="block text-sm font-bold text-gray-400 mb-2">Field to Update</label>
                        <select id="fieldSelect"
                            class="w-full bg-gray-800 text-white h-[42px] rounded-lg px-3 border border-gray-700 focus:border-blue-500 outline-none"
                            onchange="handleFieldChange()">
                            <option value="labels" selected>Label (Append)</option>
                            <option value="priority">Priority</option>
                            <option value="assignee">Assignee</option>
                            <option value="sprint">Sprint (ID)</option>
                        </select>
                    </div>

                    <!-- Value Selection/Input -->
                    <div id="valueContainer">
                        <label class="block text-sm font-bold text-gray-400 mb-2">New Value</label>
                        <input type="text" id="fieldValue" placeholder="Enter value..."
                            class="w-full bg-gray-800 text-white h-[42px] rounded-lg px-4 border border-gray-700 focus:border-blue-500 outline-none transition">

                        <!-- These will be shown/hidden based on field -->
                        <select id="prioritySelect"
                            class="hidden w-full bg-gray-800 text-white h-[42px] rounded-lg px-3 border border-gray-700 focus:border-blue-500 outline-none"></select>
                        <select id="assigneeSelect" class="hidden w-full"></select>
                        <div id="sprintWrapper" class="hidden space-y-2">
                            <select id="sprintSelect" class="w-full"></select>
                            <button onclick="toggleSprintManual()" class="text-xs text-blue-400 hover:underline">Or
                                enter Sprint ID manually</button>
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <button onclick="runBulkUpdate()" id="updateBtn"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-lg transition duration-300 flex items-center justify-center gap-2">
                        <span id="btnText">Apply Bulk Update</span>
                        <div id="btnSpinner" class="hidden animate-spin rounded-full h-5 w-5 border-b-2 border-white">
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="mt-8 hidden">
            <h2 class="text-xl font-bold mb-4">Results</h2>
            <div id="resultsList" class="space-y-2">
                <!-- Results cards populated here -->
            </div>
        </div>
    </main>

    <script>
        let priorities = [];
        let sprints = [];

        $(document).ready(function () {
            fetchMetadata();
            initAssigneeSelect();
            initSprintSelect();
        });

        async function fetchMetadata() {
            try {
                const projectKey = (localStorage.getItem("project_key") || "").trim().toUpperCase();
                const res = await fetch("/api/jira_metadata", {
                    headers: { 'X-Project-Key': projectKey }
                });
                const data = await res.json();
                priorities = data.priorities;

                const priSel = document.getElementById("prioritySelect");
                priorities.forEach(p => {
                    const opt = document.createElement("option");
                    opt.value = p.name;
                    opt.innerText = p.name;
                    priSel.appendChild(opt);
                });
            } catch (e) {
                console.error("Error fetching metadata:", e);
            }
        }

        function initAssigneeSelect() {
            $('#assigneeSelect').select2({
                placeholder: 'Search for a team member...',
                allowClear: true,
                width: '100%',
                ajax: {
                    url: '/api/assignees',
                    dataType: 'json',
                    delay: 250,
                    transport: function (params, success, failure) {
                        var $request = $.ajax(params);
                        $request.then(success);
                        $request.fail(failure);
                        return $request;
                    },
                    beforeSend: function(xhr) {
                        const projectKey = (localStorage.getItem("project_key") || "").trim().toUpperCase();
                        if (projectKey) {
                            xhr.setRequestHeader("X-Project-Key", projectKey);
                        }
                    },
                    processResults: function (data) {
                        return {
                            results: data.map(u => ({ id: u.id, text: u.name }))
                        };
                    }
                }
            });
        }

        async function initSprintSelect() {
            try {
                const projectKey = (localStorage.getItem("project_key") || "").trim().toUpperCase();
                const res = await fetch("/api/sprints", {
                    headers: { 'X-Project-Key': projectKey }
                });
                sprints = await res.json();

                const sprintData = [
                    { id: 'none', text: '-- None (Clear Field) --' },
                    ...sprints.map(s => ({
                        id: s.id,
                        text: `${s.name} (${s.state})`
                    }))
                ];

                $('#sprintSelect').select2({
                    placeholder: 'Select a Sprint...',
                    data: sprintData,
                    width: '100%'
                });
            } catch (e) {
                console.error("Error fetching sprints:", e);
            }
        }

        function toggleSprintManual() {
            const sprintWrapper = document.getElementById("sprintWrapper");
            const inputVal = document.getElementById("fieldValue");

            sprintWrapper.classList.add("hidden");
            inputVal.classList.remove("hidden");
            inputVal.placeholder = "Enter numeric Sprint ID manually...";
            inputVal.focus();
        }

        function handleFieldChange() {
            const field = document.getElementById("fieldSelect").value;
            const inputVal = document.getElementById("fieldValue");
            const selPri = document.getElementById("prioritySelect");
            const selAss = document.getElementById("assigneeSelect").nextElementSibling; // Select2 container
            const sprWrap = document.getElementById("sprintWrapper");

            // Hide all
            inputVal.classList.add("hidden");
            selPri.classList.add("hidden");
            document.getElementById("assigneeSelect").classList.add("hidden");
            if (selAss) selAss.style.display = 'none';
            sprWrap.classList.add("hidden");

            if (field === "priority") {
                selPri.classList.remove("hidden");
            } else if (field === "assignee") {
                if (selAss) selAss.style.display = 'block';
            } else if (field === "sprint") {
                sprWrap.classList.remove("hidden");
            } else {
                inputVal.classList.remove("hidden");
                inputVal.placeholder = "Enter label name...";
            }
        }

        async function runBulkUpdate() {
            const rawKeys = document.getElementById("issueKeys").value;
            const field = document.getElementById("fieldSelect").value;
            let value = "";

            if (field === "priority") {
                value = document.getElementById("prioritySelect").value;
            } else if (field === "assignee") {
                value = $('#assigneeSelect').val();
            } else if (field === "sprint") {
                // Check if wrapper is visible or manual input
                if (!document.getElementById("sprintWrapper").classList.contains("hidden")) {
                    value = $('#sprintSelect').val();
                } else {
                    value = document.getElementById("fieldValue").value;
                }
            } else {
                value = document.getElementById("fieldValue").value;
            }

            if (!rawKeys.trim()) {
                alert("Please enter at least one ticket key.");
                return;
            }
            if (!value) {
                alert("Please provide a value.");
                return;
            }

            const issueKeys = rawKeys.split(/[\n,]/).map(k => k.trim()).filter(k => k);

            // UI State
            document.getElementById("btnText").innerText = "Updating...";
            document.getElementById("btnSpinner").classList.remove("hidden");
            document.getElementById("updateBtn").disabled = true;
            document.getElementById("resultsSection").classList.remove("hidden");
            const resultsList = document.getElementById("resultsList");
            resultsList.innerHTML = '<div class="text-gray-500 italic">Processing...</div>';

            try {
                const projectKey = (localStorage.getItem("project_key") || "").trim().toUpperCase();
                const res = await fetch("/api/bulk_update", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "X-Project-Key": projectKey
                    },
                    body: JSON.stringify({ issueKeys, field, value })
                });
                const results = await res.json();

                renderResults(results);
            } catch (e) {
                console.error(e);
                alert("An error occurred during bulk update.");
            } finally {
                document.getElementById("btnText").innerText = "Apply Bulk Update";
                document.getElementById("btnSpinner").classList.add("hidden");
                document.getElementById("updateBtn").disabled = false;
            }
        }

        function renderResults(results) {
            const list = document.getElementById("resultsList");
            list.innerHTML = "";

            results.forEach(res => {
                const div = document.createElement("div");
                div.className = `p-3 rounded-xl border flex justify-between items-center ${res.status === 'success' ? 'bg-green-900/20 border-green-800' : 'bg-red-900/20 border-red-800'}`;

                const statusIcon = res.status === 'success'
                    ? '<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>'
                    : '<svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';

                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        ${statusIcon}
                        <span class="font-bold">${res.key}</span>
                    </div>
                    <span class="text-sm ${res.status === 'success' ? 'text-green-400' : 'text-red-400'}">
                        ${res.status === 'success' ? 'Updated' : (res.message || 'Failed')}
                    </span>
                `;
                list.appendChild(div);
            });
        }
    </script>
</body>

</html>
