<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Team Management - {{ project }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
    <link rel="stylesheet" href="/static/theme.css">
    <script src="/static/theme.js"></script></head>

<body class="bg-gray-900 min-h-screen text-white font-sans">
    {% include 'navbar.html' %}

    <main class="pt-24 pb-12 px-6 max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black mb-2">Team Management</h1>
                <p class="text-gray-400">Organize your personnel into high-performance teams.</p>
            </div>
            <button onclick="openCreateModal()"
                class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-lg shadow-lg transition">
                + Create Team
            </button>
        </div>

        <div id="teamsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Team cards will be loaded here -->
        </div>
    </main>

    <!-- Create Team Modal -->
    <div id="createModal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeCreateModal()"></div>
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md glass rounded-2xl p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-6">Create New Team</h3>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-400 mb-2">Team Name</label>
                <input type="text" id="teamNameInput"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 outline-none focus:border-blue-500 transition"
                    placeholder="e.g. Quick Win Team">
            </div>
            <div class="flex justify-end gap-4">
                <button onclick="closeCreateModal()" class="text-gray-400 hover:text-white font-medium">Cancel</button>
                <button onclick="createTeam()"
                    class="bg-blue-600 hover:bg-blue-500 py-2 px-6 rounded-lg font-bold">Create</button>
            </div>
        </div>
    </div>

    <script>
        async function loadTeams() {
            const projectKey = (localStorage.getItem("project_key") || "").trim().toUpperCase();
            const res = await fetch('/api/teams', {
                headers: { "X-Project-Key": projectKey }
            });
            const teams = await res.json();
            const grid = document.getElementById('teamsGrid');

            if (teams.length === 0) {
                grid.innerHTML = `<div class="col-span-full glass p-12 text-center text-gray-500 rounded-2xl">No teams found. Create your first team to get started!</div>`;
                return;
            }

            grid.innerHTML = teams.map(team => `
                <div class="glass p-6 rounded-2xl hover:border-blue-500/50 transition cursor-pointer group" onclick="location.href='/planning/${team.id}'">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-xl font-bold group-hover:text-blue-400 transition">${team.name}</h3>
                        <button onclick="event.stopPropagation(); deleteTeam(${team.id})" class="text-gray-600 hover:text-red-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                    <div class="flex -space-x-2 overflow-hidden mb-6" id="members-${team.id}">
                        <!-- Avatars loaded here -->
                    </div>
                    <div class="flex justify-between items-center text-sm text-gray-500">
                        <span>Sprint Active: Planning</span>
                        <span class="text-blue-400 font-bold group-hover:underline">Plan Sprint →</span>
                    </div>
                </div>
            `).join('');

            // Load members for each team to show avatars
            teams.forEach(team => loadMembers(team.id));
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        function getAvatarColor(name) {
            const colors = ['bg-blue-500', 'bg-purple-500', 'bg-emerald-500', 'bg-pink-500', 'bg-amber-500', 'bg-indigo-500', 'bg-cyan-500'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        async function loadMembers(teamId) {
            const projectKey = (localStorage.getItem("project_key") || "").trim().toUpperCase();
            const res = await fetch(`/api/teams/${teamId}/members`, {
                headers: { "X-Project-Key": projectKey }
            });
            const members = await res.json();
            const container = document.getElementById(`members-${teamId}`);
            if (members.length === 0) {
                container.innerHTML = '<span class="text-xs text-gray-600">No members added</span>';
                return;
            }
            container.innerHTML = members.slice(0, 5).map(m => `
                <div class="inline-flex items-center justify-center h-8 w-8 rounded-full ring-2 ring-gray-900 ${getAvatarColor(m.displayName)} text-[10px] font-bold text-white shadow-lg" title="${m.displayName}">
                    ${getInitials(m.displayName)}
                </div>
            `).join('') + (members.length > 5 ? `<span class="flex items-center justify-center h-8 w-8 rounded-full bg-gray-800 text-[10px] font-bold ring-2 ring-gray-900">+${members.length - 5}</span>` : '');
        }

        function openCreateModal() { document.getElementById('createModal').classList.remove('hidden'); }
        function closeCreateModal() { document.getElementById('createModal').classList.add('hidden'); }

        async function createTeam() {
            const name = document.getElementById('teamNameInput').value;
            if (!name) return;
            const res = await fetch('/api/teams', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            if (res.ok) {
                closeCreateModal();
                loadTeams();
            }
        }

        async function deleteTeam(id) {
            if (!confirm('Are you sure you want to delete this team?')) return;
            const projectKey = (localStorage.getItem("project_key") || "").trim().toUpperCase();
            await fetch(`/api/teams/${id}`, { 
                method: 'DELETE',
                headers: { "X-Project-Key": projectKey }
            });
            loadTeams();
        }

        loadTeams();
    </script>
</body>

</html>
