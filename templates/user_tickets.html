<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Details - {{ project }}</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/theme.css">
    <script src="/static/theme.js"></script></head>

<body class="bg-gray-900 min-h-screen text-white font-sans" onload="initUserTickets('{{ account_id }}')">

    <!-- Navigation -->
    {% include 'navbar.html' %}

    <main class="pt-24 pb-12 px-6 max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row items-start md:items-center mb-8 gap-4">
            <a href="/scoreboard" class="text-gray-400 hover:text-white transition flex items-center gap-2">
                &larr; Scoreboard
            </a>

            <h1 class="text-3xl font-bold md:ml-auto" id="userName">
                Loading User...
            </h1>

            <!-- Added Range Filter -->
            <div class="md:ml-auto flex items-center gap-2 w-full md:w-auto">
                <label class="text-sm text-gray-400 font-bold whitespace-nowrap">Filter:</label>
                <select id="range"
                    class="w-full md:w-auto bg-gray-800 text-white h-[42px] px-3 rounded border border-gray-600 focus:outline-none focus:border-blue-500 text-sm"
                    onchange="reloadWithFilter('{{ account_id }}')">
                    <option value="day">Today</option>
                    <option value="yesterday">Yesterday</option>
                    <option value="week">This Week</option>
                    <option value="month" selected>This Month</option>
                    <option value="year">This Year</option>
                    <option value="date">Specific Date</option>
                </select>

                <div id="specificDateWrapper" class="hidden flex items-center gap-2">
                    <input type="date" id="specificDate"
                        class="bg-gray-800 text-white h-[42px] px-3 rounded border border-gray-600 focus:outline-none focus:border-blue-500 text-sm">
                    <button onclick="resetUserRange('{{ account_id }}')"
                        class="text-gray-500 hover:text-white transition px-2">
                        &times;
                    </button>
                    <button onclick="reloadWithFilter('{{ account_id }}')"
                        class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold h-[32px] px-3 rounded shadow transition">
                        Go
                    </button>
                </div>
            </div>
        </div>

        <!-- Tickets List -->
        <div class="bg-gray-800 rounded-xl shadow-lg border border-gray-700 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-700 text-gray-300 uppercase text-xs">
                            <th class="p-4 whitespace-nowrap">Type</th>
                            <th class="p-4 whitespace-nowrap">Key</th>
                            <th class="p-4 w-1/2 min-w-[300px]">Summary</th>
                            <th class="p-4 whitespace-nowrap">Priority</th>
                            <th class="p-4 whitespace-nowrap">Resolved</th>
                            <th class="p-4 whitespace-nowrap text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="ticketTable" class="divide-y divide-gray-700 text-sm">
                        <tr>
                            <td colspan="6" class="p-8 text-center text-gray-500">Loading tickets...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        // Bridge execution
        function initUserTickets(accountId) {
            if (window.loadUserTickets) {
                window.loadUserTickets(accountId);
            } else {
                setTimeout(() => initUserTickets(accountId), 100);
            }
        }

        function reloadWithFilter(accountId) {
            const range = document.getElementById("range").value;
            const specificDate = document.getElementById("specificDate").value;

            if (range === "date") {
                document.getElementById("specificDateWrapper").classList.remove("hidden");
                if (!specificDate) return; // Wait for user to select date and click Go
            } else {
                document.getElementById("specificDateWrapper").classList.add("hidden");
            }

            // Update URL and reload tickets without full page reload
            let newUrl = `/user/${accountId}?range=${range}`;
            if (range === "date" && specificDate) {
                newUrl += `&date=${specificDate}`;
            }

            window.history.pushState({ path: newUrl }, '', newUrl);
            window.loadUserTickets(accountId);
        }

        function resetUserRange(accountId) {
            document.getElementById("range").value = "month";
            document.getElementById("specificDate").value = "";
            document.getElementById("specificDateWrapper").classList.add("hidden");
            reloadWithFilter(accountId);
        }
    </script>
</body>

</html>
