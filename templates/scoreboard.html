<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Scoreboard - {{ project }}</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .glass {
            background: rgba(31, 41, 55, 0.7);
            /* Match index.html glass */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
    <link rel="stylesheet" href="/static/theme.css">
    <script src="/static/theme.js"></script></head>

<body class="bg-gray-900 min-h-screen text-white font-sans" onload="initScoreboard()">

    <!-- Navigation -->
    {% include 'navbar.html' %}

    <!-- Main Content -->
    <main class="pt-24 pb-12 px-6 max-w-7xl mx-auto">

        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-white">🏆 Champions Leaderboard</h1>
        </div>

        <!-- Filters -->
        <div
            class="bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-700 mb-8 flex flex-col md:flex-row gap-6 items-center">
            <div class="w-full md:w-auto flex-1">
                <label class="text-gray-400 font-bold block mb-2 text-sm">Time Range</label>
                <select id="range"
                    class="w-full bg-gray-700 text-white h-[42px] px-3 rounded border border-gray-600 focus:outline-none focus:border-blue-500 transition"
                    onchange="loadScoreboardData()">
                    <option value="day">Today</option>
                    <option value="yesterday">Yesterday</option>
                    <option value="week">This Week</option>
                    <option value="month">This Month</option>
                    <option value="year">This Year</option>
                </select>
            </div>

            <button onclick="loadScoreboardData()"
                class="bg-blue-600 hover:bg-blue-500 text-white font-bold h-[42px] px-6 rounded shadow-lg transition transform hover:scale-105 mt-auto">
                Refresh Stats
            </button>
        </div>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- Leaderboard Column -->
            <div class="lg:col-span-1 space-y-4">
                <h2 class="text-2xl font-bold mb-4 flex items-center gap-2 text-gray-200">
                    <span>🥇</span> Top Performers
                </h2>
                <div id="leaderboard" class="space-y-3">
                    <!-- Cards injected here -->
                    <div class="animate-pulse flex space-x-4 bg-gray-800 p-4 rounded-lg border border-gray-700">
                        <div class="rounded-full bg-gray-700 h-12 w-12"></div>
                        <div class="flex-1 space-y-4 py-1">
                            <div class="h-4 bg-gray-700 rounded w-3/4"></div>
                            <div class="h-4 bg-gray-700 rounded w-1/2"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Graphs Column -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Comparison Chart -->
                <div class="glass p-6 rounded-2xl border border-gray-700">
                    <h3 class="text-xl font-bold mb-4 text-gray-300">⚔️ Head-to-Head Comparison</h3>
                    <div class="h-64">
                        <canvas id="comparisonChart"></canvas>
                    </div>
                </div>

                <!-- Trends Chart -->
                <div class="glass p-6 rounded-2xl border border-gray-700">
                    <h3 class="text-xl font-bold mb-4 text-gray-300">📈 Team Velocity (Tickets Closed)</h3>
                    <div class="h-64">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script src="/static/app.js"></script>
    <script>
        // Inline simple init to bridge to app.js
        function initScoreboard() {
            // Wait for app.js to load or just call logic if available
            if (window.loadScoreboardData) {
                window.loadScoreboardData();
            } else {
                setTimeout(initScoreboard, 100);
            }
        }
    </script>
</body>

</html>
