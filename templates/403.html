<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - 403</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/theme.css">
    <script src="/static/theme.js"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center text-white font-sans">
    <div class="text-center max-w-md p-8 bg-gray-800 rounded-2xl shadow-2xl border border-gray-700">
        <div class="text-6xl text-red-500 mb-6">
            <i class="fas fa-lock"></i>
        </div>
        <h1 class="text-4xl font-bold mb-2">Access Denied</h1>
        <p class="text-gray-400 mb-8 text-lg">You do not have permission to view this page.</p>
        <div class="space-y-3">
            <a href="/" class="block w-full py-3 px-6 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold transition duration-200">
                <i class="fas fa-home mr-2"></i> Go to Dashboard
            </a>
            <button onclick="history.back()" class="block w-full py-3 px-6 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition duration-200">
                <i class="fas fa-arrow-left mr-2"></i> Go Back
            </button>
        </div>
    </div>
</body>
</html>
