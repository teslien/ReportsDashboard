<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Jira Analytics</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="/static/theme.css">
    <script src="/static/theme.js"></script>
</head>

<body class="bg-gray-900 min-h-screen text-white font-sans">

    <!-- Navigation -->
    {% include 'navbar.html' %}

    <!-- Main Content -->
    <main class="pt-24 pb-12 px-6 max-w-7xl mx-auto">
        <div class="max-w-2xl mx-auto bg-gray-800 rounded-lg shadow-xl p-6 border border-gray-700">
            <h1 class="text-2xl font-bold text-white mb-6 flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                Jira Configuration
            </h1>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Jira Domain</label>
                    <input type="text" id="jira_domain"
                        class="w-full bg-gray-700 border border-gray-600 rounded-md px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="https://your-company.atlassian.net">
                    <p class="mt-1 text-xs text-gray-500">The full URL of your Jira instance.</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Jira Email</label>
                    <input type="email" id="jira_email"
                        class="w-full bg-gray-700 border border-gray-600 rounded-md px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="your.email@company.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Jira API Token</label>
                    <div class="relative">
                        <input type="password" id="jira_token"
                            class="w-full bg-gray-700 border border-gray-600 rounded-md px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="Enter your Jira API Token">
                        <button type="button" onclick="toggleVisibility('jira_token')"
                            class="absolute right-3 top-2.5 text-gray-400 hover:text-white">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                    <p class="mt-1 text-xs text-gray-500">You can generate an API token at <a
                            href="https://id.atlassian.com/manage-profile/security/api-tokens" target="_blank"
                            class="text-blue-400 hover:underline">Atlassian Security</a></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Project Key</label>
                    <input type="text" id="project_key"
                        class="w-full bg-gray-700 border border-gray-600 rounded-md px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase"
                        placeholder="e.g. PROJ">
                </div>

                <div class="pt-4 flex justify-end">
                    <button id="saveBtn" onclick="saveSettings()"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md transition-colors flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                        Save Configuration
                    </button>
                </div>
            </div>
        </div>

        <!-- To-Do Tags Configuration -->
        <div class="max-w-2xl mx-auto bg-gray-800 rounded-lg shadow-xl p-6 border border-gray-700 mt-8">
            <h2 class="text-xl font-bold text-white mb-4 flex items-center">
                <svg class="w-5 h-5 mr-2 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
                </svg>
                To-Do Tags
            </h2>
            <p class="text-xs text-gray-400 mb-6">Create tags to assign to your tasks for better organization.</p>

            <div class="space-y-4">
                <!-- Tag List -->
                <div id="tagsList" class="flex flex-wrap gap-2 min-h-[40px]">
                    <!-- Tags will be dynamically loaded here -->
                </div>

                <!-- Add New Tag Form -->
                <div class="flex items-center gap-3 pt-4 border-t border-gray-700">
                    <input type="text" id="newTagName" placeholder="New Tag Name"
                        class="flex-1 bg-gray-700 border border-gray-600 rounded-md px-3 py-1.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="newTagColor"
                        class="bg-gray-700 border border-gray-600 rounded-md px-3 py-1.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="blue">Blue</option>
                        <option value="red">Red</option>
                        <option value="green">Green</option>
                        <option value="yellow">Yellow</option>
                        <option value="purple">Purple</option>
                        <option value="pink">Pink</option>
                        <option value="gray">Gray</option>
                    </select>
                    <button onclick="addTodoTag()"
                        class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-1.5 px-4 rounded-md transition-colors text-sm border border-gray-600">
                        Add Tag
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Load settings from database API on page load
        document.addEventListener('DOMContentLoaded', async function () {
            try {
                const res = await fetch('/api/settings/jira');
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('jira_domain').value = data.jira_domain || '';
                    document.getElementById('jira_email').value = data.email || '';
                    document.getElementById('jira_token').value = data.token || '';
                    document.getElementById('project_key').value = data.project_key || '';
                }
            } catch (err) {
                console.error("Failed to load Jira config:", err);
            }

            // Load tags
            loadTodoTags();
        });

        const settingsColorClasses = {
            'blue': 'bg-blue-500/20 text-blue-400 border-blue-500/30',
            'red': 'bg-red-500/20 text-red-400 border-red-500/30',
            'green': 'bg-green-500/20 text-green-400 border-green-500/30',
            'yellow': 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30',
            'purple': 'bg-purple-500/20 text-purple-400 border-purple-500/30',
            'pink': 'bg-pink-500/20 text-pink-400 border-pink-500/30',
            'gray': 'bg-gray-500/20 text-gray-400 border-gray-500/30'
        };

        async function loadTodoTags() {
            try {
                const res = await fetch('/api/settings/todo_tags');
                if (res.ok) {
                    const tags = await res.json();
                    const container = document.getElementById('tagsList');

                    if (tags.length === 0) {
                        container.innerHTML = '<span class="text-xs text-gray-500 italic py-2">No tags created yet.</span>';
                        return;
                    }

                    container.innerHTML = tags.map(t => {
                        const style = settingsColorClasses[t.color] || settingsColorClasses['blue'];
                        return `
                        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border text-xs font-semibold ${style}">
                            ${t.name}
                            <button onclick="deleteTodoTag(${t.id})" class="hover:text-white focus:outline-none ml-1 opacity-70 hover:opacity-100 transition">
                                &times;
                            </button>
                        </div>
                        `;
                    }).join('');
                }
            } catch (err) {
                console.error("Failed to load tags:", err);
            }
        }

        async function addTodoTag() {
            const nameInput = document.getElementById('newTagName');
            const colorInput = document.getElementById('newTagColor');

            const name = nameInput.value.trim();
            const color = colorInput.value;

            if (!name) {
                nameInput.classList.add('border-red-500');
                setTimeout(() => nameInput.classList.remove('border-red-500'), 2000);
                return;
            }

            try {
                const res = await fetch('/api/settings/todo_tags', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, color })
                });

                if (res.ok) {
                    nameInput.value = '';
                    loadTodoTags();
                } else {
                    const errorData = await res.json();
                    alert('Error adding tag: ' + (errorData.error || 'Unknown error'));
                }
            } catch (err) {
                console.error(err);
                alert('Connection error occurred.');
            }
        }

        async function deleteTodoTag(id) {
            if (!confirm('Are you sure you want to delete this tag? Tasks using it might lose the tag styling.')) return;

            try {
                const res = await fetch(`/api/settings/todo_tags/${id}`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    loadTodoTags();
                } else {
                    alert('Failed to delete tag.');
                }
            } catch (err) {
                console.error(err);
            }
        }

        function toggleVisibility(id) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        async function saveSettings() {
            const domain = document.getElementById('jira_domain').value.trim();
            const email = document.getElementById('jira_email').value.trim();
            const token = document.getElementById('jira_token').value.trim();
            const project = document.getElementById('project_key').value.trim().toUpperCase();

            if (!domain || !email || !token || !project) {
                alert('Please fill in all fields');
                return;
            }

            if (token.length < 50) {
                const proceed = confirm(
                    "Warning: Your Jira API Token seems unusually short (" + token.length + " characters).\n\n" +
                    "Tip: If you double-clicked the token to copy it, you might have only grabbed the part before a hyphen (-). Make sure to select the ENTIRE token.\n\n" +
                    "Do you still want to save this token?"
                );
                if (!proceed) return;
            }

            localStorage.removeItem('jira_domain');
            localStorage.removeItem('jira_email');
            localStorage.removeItem('jira_token');
            localStorage.removeItem('project_key');
            document.cookie = 'jira_domain=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            document.cookie = 'jira_email=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            document.cookie = 'jira_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            document.cookie = 'project_key=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';

            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `
                <svg class="w-5 h-5 mr-2 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Saving...
            `;
            btn.disabled = true;

            try {
                const res = await fetch('/api/settings/jira', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jira_domain: domain, email, token, project_key: project })
                });

                if (res.ok) {
                    alert('Settings saved successfully! You can now use the dashboard with your credentials.');
                    window.location.href = '/';
                } else {
                    const errorData = await res.json();
                    alert('Error saving settings: ' + (errorData.error || 'Unknown error'));
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                alert('Connection error occurred while saving.');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
