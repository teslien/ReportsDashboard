<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Sprint Planning - {{ project }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --glass-bg: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #3b82f6;
            --accent-purple: #818cf8;
            --accent-emerald: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.2);
        }

        .glass-hover:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(30, 41, 59, 0.6);
            transform: translateY(-2px);
        }

        .ticket-card {
            background: var(--bg-card) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ticket-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(59, 130, 246, 0.4) !important;
            background: rgba(30, 41, 59, 0.9) !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .week-column {
            flex: 1 1 340px;
            min-width: 340px;
            max-width: 500px;
            height: fit-content;
        }
    </style>
    <link rel="stylesheet" href="/static/theme.css">
    <script src="/static/theme.js"></script>
    <script src="/static/app.js"></script></head>

<body class="bg-[#0f172a] min-h-screen text-[#f8fafc] font-sans selection:bg-blue-500/30">
    {% include 'navbar.html' %}

    <main class="pt-24 pb-12 px-6 max-w-[1600px] mx-auto">
        <!-- Team Members & Controls -->
        <div class="flex flex-wrap justify-between items-end gap-6 mb-8">
            <div>
                <h1
                    class="text-4xl font-black mb-4 bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">
                    Sprint Planning</h1>
                <div class="flex items-center gap-3 glass p-3 rounded-2xl" id="memberList">
                    <!-- Members List -->
                </div>
            </div>
            <div class="flex gap-4 items-center flex-wrap justify-end">
                <div class="relative group/search max-w-xs w-full">
                    <input type="text" id="ticketSearch" oninput="applySearch(this.value)"
                        class="w-full bg-blue-900/40 border border-white/10 text-blue-100/70 text-xs font-black py-2.5 pl-10 pr-4 rounded-xl outline-none focus:border-blue-500/40 transition-all shadow-xl backdrop-blur-md placeholder-blue-100/20"
                        placeholder="Search key or summary...">
                    <div
                        class="absolute left-3.5 top-1/2 -translate-y-1/2 text-blue-500/30 group-focus-within/search:text-blue-400 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="3"></path>
                        </svg>
                    </div>
                </div>
                <select id="assigneeFilter" onchange="filterTickets(this.value)"
                    class="bg-blue-900/40 border border-white/10 text-blue-100/70 text-xs font-black py-2.5 px-6 rounded-xl outline-none focus:border-blue-500/40 transition-all shadow-xl backdrop-blur-md">
                    <option value="All">All Assignees</option>
                </select>
                <button onclick="openMemberModal()"
                    class="bg-gray-800 hover:bg-gray-700 text-white font-bold py-2.5 px-6 rounded-lg border border-gray-700 transition">+
                    Add Member</button>
                <button onclick="refreshJiraData()"
                    class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 px-6 rounded-lg shadow-lg transition">Refresh
                    Jira Data</button>
                <button onclick="openSprintModal()"
                    class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 px-6 rounded-lg shadow-lg transition">Create
                    Sprint</button>
            </div>
        </div>

        <!-- Sprints Navigation -->
        <div class="flex gap-4 mb-8 overflow-x-auto pb-2" id="sprintsTab">
            <!-- Sprint Tabs -->
        </div>

        <!-- Sprint Content (Weeks) -->
        <div id="sprintContent" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-blue-400" id="currentSprintTitle">Sprint Name</h2>
                <button onclick="addWeek()"
                    class="bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 font-bold py-2 px-4 rounded-lg border border-blue-500/30 transition">+
                    Add Week</button>
            </div>

            <div id="weeksGrid" class="flex gap-6 overflow-x-auto pb-6 scroll-smooth">
                <!-- Weekly columns will go here -->
            </div>
        </div>

        <div id="emptySprintState" class="glass rounded-2xl p-20 text-center text-gray-500 mt-12">
            No sprints found for this team. Click "Create Sprint" to begin planning.
        </div>
    </main>

    <!-- Modals -->
    <!-- Member Modal -->
    <div id="memberModal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeMemberModal()"></div>
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md glass rounded-3xl p-8 border-white/10 shadow-2xl">
            <h3 class="text-2xl font-black mb-1 capitalize">Add Team Member</h3>
            <p class="text-gray-500 text-xs mb-8">Search and add Jira users to your team.</p>
            <div class="mb-6">
                <div class="relative group/search">
                    <input type="text" id="memberSearchInput"
                        class="w-full bg-gray-900/50 border border-gray-800 rounded-2xl p-4 pl-12 outline-none focus:border-blue-500/50 focus:bg-gray-900 transition text-sm shadow-inner"
                        placeholder="Type name or email..." oninput="searchUsers()">
                    <div
                        class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 group-focus-within/search:text-blue-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5"></path>
                        </svg>
                    </div>
                </div>
                <div id="userResults" class="mt-4 max-h-60 overflow-y-auto space-y-2 hidden custom-scrollbar"></div>
            </div>
            <button onclick="closeMemberModal()"
                class="w-full py-4 text-xs font-black uppercase tracking-widest text-gray-500 hover:text-white transition">Cancel</button>
        </div>
    </div>

    <!-- Sprint Modal -->
    <div id="sprintModal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeSprintModal()"></div>
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md glass rounded-3xl p-8 border-white/10 shadow-2xl">
            <h3 class="text-2xl font-black mb-1 capitalize">New Sprint</h3>
            <p class="text-gray-500 text-xs mb-8">Set up a new development cycle.</p>
            <div class="mb-8">
                <input type="text" id="sprintNameInput"
                    class="w-full bg-gray-900/50 border border-gray-800 rounded-2xl p-4 outline-none focus:border-blue-500/50 focus:bg-gray-900 transition text-sm shadow-inner"
                    placeholder="e.g. Sprint 1 - Project X">
            </div>
            <button onclick="createSprint()"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg shadow-blue-500/20 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                Create Cycle
            </button>
            <button onclick="closeSprintModal()"
                class="w-full mt-4 py-2 text-xs font-black uppercase tracking-widest text-gray-500 hover:text-white transition">Cancel</button>
        </div>
    </div>

    <script>
        const teamId = {{ team_id }};
        let currentSprintId = null;
        let selectedAssignee = 'All';
        let searchQuery = '';
        let allTickets = [];

        async function init() {
            loadTeam();
            loadSprints();
        }

        async function loadTeam() {
            const res = await fetch('/api/teams');
            const teams = await res.json();
            const curr = teams.find(t => t.id === teamId);
            if (curr) document.getElementById('teamNameHeader').innerText = curr.name;
            loadMembers();
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        function getAvatarColor(name) {
            const colors = ['bg-blue-500', 'bg-purple-500', 'bg-emerald-500', 'bg-pink-500', 'bg-amber-500', 'bg-indigo-500', 'bg-cyan-500'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        async function loadMembers() {
            const res = await fetch(`/api/teams/${teamId}/members`);
            const members = await res.json();
            const list = document.getElementById('memberList');
            const filter = document.getElementById('assigneeFilter');

            list.innerHTML = members.map(m => `
                <div class="relative group">
                    <div class="w-10 h-10 rounded-full border border-gray-700 flex items-center justify-center text-xs font-bold text-white shadow-xl ${getAvatarColor(m.displayName)}" title="${m.displayName}">
                        ${getInitials(m.displayName)}
                    </div>
                    <button onclick="removeMember(${m.id})" class="absolute -top-1 -right-1 bg-red-500 rounded-full p-1 opacity-0 group-hover:opacity-100 transition z-10">
                        <svg class="w-2 h-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3"></path></svg>
                    </button>
                </div>
            `).join('') + (members.length === 0 ? '<span class="px-4 text-sm text-gray-500">No members yet</span>' : '');

            // Update filter dropdown
            const prev = filter.value;
            filter.innerHTML = '<option value="All">All Assignees</option>' +
                members.map(m => `<option value="${m.displayName}">${m.displayName}</option>`).join('');
            filter.value = prev;
        }

        async function searchUsers() {
            const query = document.getElementById('memberSearchInput').value;
            if (query.length < 3) return;
            const res = await fetch(`/api/assignees?q=${query}`, { headers: getApiHeaders() });
            const users = await res.json();
            const list = document.getElementById('userResults');
            list.classList.remove('hidden');
            list.innerHTML = users.map(u => `
                <div onclick="addMember('${u.id}', '${u.name}')" class="p-3 hover:bg-blue-600/20 cursor-pointer rounded-lg mb-1 flex items-center justify-between">
                    <span>${u.name}</span>
                    <span class="text-blue-400 text-xs">+ Add</span>
                </div>
            `).join('');
        }

        async function addMember(accountId, displayName) {
            await fetch(`/api/teams/${teamId}/members`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ accountId, displayName, avatarUrl: '' })
            });
            closeMemberModal();
            loadMembers();
        }

        async function removeMember(id) {
            await fetch(`/api/teams/${teamId}/members/${id}`, { method: 'DELETE' });
            loadMembers();
        }

        async function loadSprints() {
            const res = await fetch(`/api/teams/${teamId}/sprints`);
            const sprints = await res.json();
            const tab = document.getElementById('sprintsTab');
            const content = document.getElementById('sprintContent');
            const empty = document.getElementById('emptySprintState');

            if (sprints.length === 0) {
                tab.innerHTML = '';
                content.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            content.classList.remove('hidden');
            tab.innerHTML = sprints.map(s => `
                <button onclick='switchSprint(${s.id}, ${JSON.stringify(s.name).replace(/'/g, "&#39;")})' class="px-8 py-3 rounded-2xl border ${currentSprintId === s.id ? 'bg-blue-600 border-blue-500 font-bold shadow-lg shadow-blue-500/20' : 'glass border-gray-700 text-gray-400 hover:text-white'} whitespace-nowrap transition text-base">${s.name}</button>
            `).join('');

            if (!currentSprintId) switchSprint(sprints[0].id, sprints[0].name);
        }

        function switchSprint(id, name) {
            currentSprintId = id;
            document.getElementById('currentSprintTitle').innerText = name;
            loadSprints();
            loadWeeks();
        }

        async function loadWeeks() {
            const res = await fetch(`/api/sprints/${currentSprintId}/weeks`, { headers: getApiHeaders() });
            const weeks = await res.json();
            const grid = document.getElementById('weeksGrid');

            grid.innerHTML = weeks.map(w => `
                <div class="week-column flex-shrink-0 animate-slide-in">
                    <div class="glass rounded-2xl flex flex-col h-full overflow-hidden border-gray-800/50">
                        <!-- Column Header -->
                        <div class="p-5 border-b border-white/5 bg-blue-500/5">
                            <div class="flex justify-between items-center mb-3">
                                <div class="flex items-center gap-3">
                                    <h3 class="font-black text-[13px] tracking-[0.2em] uppercase text-blue-100/70">Week ${w.weekNumber}</h3>
                                    <span id="count-${w.id}" class="bg-blue-500/20 text-blue-300 text-[11px] px-2.5 py-0.5 rounded-full font-black border border-blue-500/30">0</span>
                                </div>
                                <button onclick="deleteWeek(${w.id})" class="text-white/20 hover:text-red-400 p-1.5 rounded-xl hover:bg-red-500/20 transition-all">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3"></path></svg>
                                </button>
                            </div>
                            <input type="text" placeholder="Set weekly goal..." value="${w.goal || ''}" 
                                onblur="updateWeekGoal(${w.id}, this.value)"
                                class="w-full bg-white/5 border border-white/5 rounded-xl py-2 px-3 text-[13px] text-blue-300 focus:text-white outline-none placeholder-blue-900/40 italic font-bold focus:bg-blue-500/10 transition-all">
                        </div>

                        <!-- Tickets Container -->
                        <div class="p-4 flex-grow space-y-4 min-h-[450px] bg-gray-900/20" id="tickets-${w.id}">
                            <!-- Tickets for this week -->
                        </div>

                        <!-- Input Area -->
                        <div class="p-4 bg-blue-500/5 border-t border-white/5">
                            <div class="relative group/add">
                                <input type="text" placeholder="Add keys (TIM-1, TIM-2...)" 
                                    class="w-full bg-white/5 border border-white/10 rounded-xl py-3.5 pl-5 pr-12 text-[13px] font-bold outline-none focus:border-blue-500/40 focus:bg-blue-500/10 focus:text-white transition-all shadow-inner placeholder-blue-100/20" 
                                    onkeydown="if(event.key==='Enter') addTicket(${w.id}, this)">
                                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-blue-500/40 group-focus-within/add:text-blue-400 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="3.5"></path></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            loadSprintTickets();
        }

        async function updateWeekGoal(id, goal) {
            await fetch(`/api/sprint_weeks/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ goal })
            });
        }

        async function addWeek() {
            const res = await fetch(`/api/sprints/${currentSprintId}/weeks`);
            const existing = await res.json();
            const num = existing.length + 1;
            await fetch(`/api/sprints/${currentSprintId}/weeks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ weekNumber: num })
            });
            loadWeeks();
        }

        async function deleteWeek(id) {
            await fetch(`/api/sprint_weeks/${id}`, { method: 'DELETE' });
            loadWeeks();
        }

        async function addTicket(weekId, input) {
            const rawValue = input.value.trim();
            if (!rawValue) return;

            // Split by whitespace or comma, then filter out empty strings and map to uppercase
            const keys = rawValue.split(/[\s,]+/).filter(k => k.length > 0).map(k => k.toUpperCase());

            if (keys.length === 0) return;

            input.value = ''; // Clear early for better UX

            // Process all keys concurrently
            await Promise.all(keys.map(key =>
                fetch(`/api/sprints/${currentSprintId}/tickets`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ weekId, issueKey: key })
                })
            ));

            loadSprintTickets();
        }

        async function loadSprintTickets() {
            if (!currentSprintId) return;
            const projectKey = (localStorage.getItem("project_key") || "").trim().toUpperCase();
            const res = await fetch(`/api/sprints/${currentSprintId}/tickets`, {
                headers: { 
                    'X-Project-Key': projectKey 
                }
            });
            allTickets = await res.json();
            renderFilteredTickets();
        }

        function filterTickets(val) {
            selectedAssignee = val;
            renderFilteredTickets();
        }

        function applySearch(val) {
            searchQuery = val.toLowerCase().trim();
            renderFilteredTickets();
        }

        function renderFilteredTickets() {
            document.querySelectorAll('[id^="tickets-"]').forEach(c => c.innerHTML = '');

            allTickets.forEach(t => {
                const container = document.getElementById(`tickets-${t.weekId}`);
                if (container) {
                    const div = document.createElement('div');
                    div.id = `ticket-row-${t.id}`;
                    container.appendChild(div);
                    fetchTicketDetails(t.id, t.issueKey);
                }
            });
            updateCounts();
        }

        function updateCounts() {
            const counts = {};
            document.querySelectorAll('[id^="tickets-"]').forEach(container => {
                const wid = container.id.split('-')[1];
                const visibleCount = Array.from(container.children).filter(c => !c.classList.contains('hidden') && c.innerHTML.trim() !== '').length;
                counts[wid] = visibleCount;
            });
            Object.keys(counts).forEach(wid => {
                const el = document.getElementById(`count-${wid}`);
                if (el) el.innerText = counts[wid];
            });
        }

        const CACHE_TTL = 3600000; // 1 hour in ms

        async function fetchTicketDetails(dbId, key) {
            try {
                // Check Cache
                const cacheKey = `jira_cache_${key}`;
                const cached = localStorage.getItem(cacheKey);
                if (cached) {
                    const { data, timestamp } = JSON.parse(cached);
                    if (Date.now() - timestamp < CACHE_TTL) {
                        renderTicketData(dbId, data);
                        return;
                    }
                }

                const res = await fetch('/api/execute_jql', {
                    method: 'POST',
                    headers: getApiHeaders(),
                    body: JSON.stringify({ jql: `key = "${key}"` })
                });
                const data = await res.json();
                if (data.length > 0) {
                    const jiraIssue = data[0];
                    localStorage.setItem(cacheKey, JSON.stringify({ data: jiraIssue, timestamp: Date.now() }));
                    renderTicketData(dbId, jiraIssue);
                }
            } catch (e) {
                console.error("Error fetching ticket details:", e);
            }
        }

        function renderTicketData(dbId, jiraIssue) {
            const fields = jiraIssue.fields || {};
            const statusName = fields.status ? fields.status.name : 'Unknown';
            const summaryText = fields.summary || 'No Summary';
            const assignee = fields.assignee ? fields.assignee.displayName : 'Unassigned';

            const div = document.getElementById(`ticket-row-${dbId}`);
            if (!div) return;

            // Apply Filters (Assignee & Search)
            const matchesAssignee = selectedAssignee === 'All' || assignee === selectedAssignee;
            const matchesSearch = searchQuery === '' ||
                t.issueKey.toLowerCase().includes(searchQuery) ||
                summaryText.toLowerCase().includes(searchQuery);

            if (!matchesAssignee || !matchesSearch) {
                div.innerHTML = '';
                div.classList.add('hidden');
                updateCounts();
                return;
            }

            const t = allTickets.find(ticket => ticket.id === dbId);
            if (!t) return;

            div.classList.remove('hidden');
            div.className = 'ticket-card glass p-3.5 rounded-2xl border-gray-800/50 shadow-xl mb-3 animate-slide-in relative overflow-hidden group/card';

            const greenStatuses = ["DEPLOYED", "DONE", "NOT A BUG", "READY FOR STAGING", "RESOLVED", "STAGED", "UNABLE TO REPRODUCE", "READY FOR QA", "READY FOR INTERNAL DEMO"];
            const isGreen = greenStatuses.includes(statusName.toUpperCase());

            div.innerHTML = `
                <!-- Left Accent -->
                <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-gradient-to-b from-blue-500 to-purple-600 opacity-0 group-hover/card:opacity-100 transition-opacity"></div>
                
                <div class="flex justify-between items-start mb-3">
                    <div class="flex-grow min-w-0 pr-3">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-blue-400 font-black text-[14px] tracking-widest uppercase mb-1 block">${t.issueKey}</span>
                            <span class="text-[11px] px-3 py-0.5 rounded-full font-black tracking-wider ${isGreen ? 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/30' : 'bg-blue-500/20 text-blue-300 border border-blue-500/30'} shadow-sm">${statusName.toUpperCase()}</span>
                        </div>
                        <span class="text-[14px] text-white font-bold leading-relaxed line-clamp-3">${summaryText}</span>
                    </div>
                    <div class="flex flex-col items-end gap-3">
                        <button onclick="removeTicket(${t.id})" class="text-gray-500 hover:text-red-400 opacity-0 group-hover/card:opacity-100 transition-all transform hover:scale-125">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3"></path></svg>
                        </button>
                        <div class="transform transition-all group-hover/card:scale-110 shadow-lg shadow-black/50">
                            <div class="inline-flex items-center justify-center h-6 w-6 rounded-full ${getAvatarColor(assignee)} text-[9px] font-black text-white shadow-lg ring-2 ring-gray-900" title="${assignee}">
                                ${getInitials(assignee)}
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="flex flex-col gap-3.5 mt-4 pt-4 border-t border-white/10">
                    <div class="flex items-center gap-5">
                        <label class="flex items-center gap-2.5 cursor-pointer group/flag">
                            <input type="checkbox" ${t.prRaised ? 'checked' : ''} onchange="updateTicketMeta(${t.id}, {prRaised: this.checked})" class="hidden peer">
                            <div class="w-5 h-5 rounded-lg border-2 border-gray-700 peer-checked:bg-blue-600 peer-checked:border-blue-600 flex items-center justify-center transition shadow-lg shadow-blue-500/20">
                                <svg class="w-3.5 h-3.5 text-white scale-0 peer-checked:scale-110 transition" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg>
                            </div>
                            <span class="text-[10px] font-black text-gray-400 peer-checked:text-blue-400 uppercase tracking-widest transition-colors">PR Raised</span>
                        </label>
                        
                        <label class="flex items-center gap-2.5 cursor-pointer group/flag">
                            <input type="checkbox" ${t.demoDone ? 'checked' : ''} onchange="updateTicketMeta(${t.id}, {demoDone: this.checked})" class="hidden peer">
                            <div class="w-5 h-5 rounded-lg border-2 border-gray-700 peer-checked:bg-emerald-600 peer-checked:border-emerald-600 flex items-center justify-center transition shadow-lg shadow-emerald-500/20">
                                <svg class="w-3.5 h-3.5 text-white scale-0 peer-checked:scale-110 transition" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg>
                            </div>
                            <span class="text-[10px] font-black text-gray-400 peer-checked:text-emerald-400 uppercase tracking-widest transition-colors">Demo Done</span>
                        </label>

                        <label class="flex items-center gap-2.5 cursor-pointer group/flag">
                            <input type="checkbox" ${t.prMerged ? 'checked' : ''} onchange="updateTicketMeta(${t.id}, {prMerged: this.checked})" class="hidden peer">
                            <div class="w-5 h-5 rounded-lg border-2 border-gray-700 peer-checked:bg-purple-600 peer-checked:border-purple-600 flex items-center justify-center transition shadow-lg shadow-purple-500/20">
                                <svg class="w-3.5 h-3.5 text-white scale-0 peer-checked:scale-110 transition" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg>
                            </div>
                            <span class="text-[10px] font-black text-gray-400 peer-checked:text-purple-400 uppercase tracking-widest transition-colors">PR Merged</span>
                        </label>
                    </div>
                    
                    <div class="relative flex items-center gap-3 bg-black/40 p-2.5 rounded-xl border border-white/5 group/input shadow-inner">
                        <svg class="w-4 h-4 text-gray-500 group-focus-within/input:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" stroke-width="2.5"></path></svg>
                        <input type="text" placeholder="Add a quick note..." value="${t.comment || ''}" 
                            onblur="updateTicketMeta(${t.id}, {comment: this.value})"
                            onkeyup="if(event.key==='Enter') this.blur()"
                            class="w-full bg-transparent border-none text-[11px] text-gray-300 focus:text-white outline-none placeholder-gray-600 pb-0.5">
                    </div>
                </div>
            `;
            updateCounts();
        }

        function refreshJiraData() {
            // Clear only jira cache
            Object.keys(localStorage).forEach(key => {
                if (key.startsWith('jira_cache_')) localStorage.removeItem(key);
            });
            loadSprintTickets();
        }

        async function updateTicketMeta(id, data) {
            // Find existing ticket data to merge
            const resSprints = await fetch(`/api/sprints/${currentSprintId}/tickets`, { headers: getApiHeaders() });
            const tickets = await resSprints.json();
            const ticket = tickets.find(t => t.id === id);

            const payload = {
                comment: data.comment !== undefined ? data.comment : ticket.comment,
                prRaised: data.prRaised !== undefined ? data.prRaised : ticket.prRaised,
                demoDone: data.demoDone !== undefined ? data.demoDone : ticket.demoDone,
                prMerged: data.prMerged !== undefined ? data.prMerged : ticket.prMerged
            };

            await fetch(`/api/sprint_tickets/${id}`, {
                method: 'PUT',
                headers: getApiHeaders(),
                body: JSON.stringify(payload)
            });
        }

        async function removeTicket(id) {
            await fetch(`/api/sprint_tickets/${id}`, { method: 'DELETE', headers: getApiHeaders() });
            loadSprintTickets();
        }

        function openMemberModal() { document.getElementById('memberModal').classList.remove('hidden'); }
        function closeMemberModal() { document.getElementById('memberModal').classList.add('hidden'); }
        function openSprintModal() { document.getElementById('sprintModal').classList.remove('hidden'); }
        function closeSprintModal() { document.getElementById('sprintModal').classList.add('hidden'); }

        async function createSprint() {
            const name = document.getElementById('sprintNameInput').value;
            if (!name) return;
            await fetch(`/api/teams/${teamId}/sprints`, {
                method: 'POST',
                headers: getApiHeaders(),
                body: JSON.stringify({ name })
            });
            closeSprintModal();
            loadSprints();
        }

        init();
    </script>
</body>

</html>
